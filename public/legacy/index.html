// PAGE: LEARNING LOOP
// ──────────────────────────────────────────────────────────────
function LearningPage({cfg}){
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);
  const [err,setErr]=useState('');

  const run=async()=>{
    if(!cfg.url)return;
    setLoading(true);setErr('');
    try{
      // Fetch tracked resumes with outcomes
      const r=await fetch(cfg.url+'/rest/v1/tracked_resumes?select=*&order=created_at.desc&limit=50',
        {headers:{apikey:cfg.key,'Authorization':'Bearer '+cfg.key}});
      const items=await r.json();
      if(!items?.length){setErr('No tracked resumes yet. Run Analyzer and save results first.');setLoading(false);return;}
      const res=await fetch('/api/learning-loop',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({resumes:items.map(i=>({id:i.id,company:i.company,role:i.role,score:i.score,
          status:i.status,matched_keywords:i.matched_keywords,missing_keywords:i.missing_keywords,suggestions:i.suggestions}))})});
      const d=await res.json();
      if(!res.ok)throw new Error(d.error||'Failed');
      setResult(d);
    }catch(e){setErr(e.message);}
    finally{setLoading(false);}
  };

  return(
    <div>
      <div style={{marginBottom:20}}>
        <h1 style={{fontSize:20,fontWeight:700,marginBottom:4}}>🔁 Learning Loop</h1>
        <p className="muted" style={{fontSize:13}}>AI analyses your past applications and outcomes to surface patterns and improve future strategy.</p>
      </div>
      {err&&<div className="alert alert-err"><span className="alert-icon">⚠️</span>{err}</div>}
      <div className="card-accent" style={{marginBottom:20}}>
        <div style={{fontWeight:600,marginBottom:6}}>How it works</div>
        <div style={{fontSize:13,color:'var(--text2)',lineHeight:1.7,marginBottom:14}}>
          Pulls your tracker data → AI identifies what's working, what's not, keyword impact patterns, and gives you a personalised recommendation to improve hit rate.
        </div>
        <button className="btn btn-primary" onClick={run} disabled={loading}>
          {loading?<><span className="spinner"/>Analysing patterns…</>:'🧠 Run Learning Loop'}
        </button>
      </div>
      {loading&&<div className="card" style={{textAlign:'center',padding:'40px 24px'}}>
        <div className="spinner spinner-b" style={{width:28,height:28,margin:'0 auto 12px'}}/>
        <div style={{fontWeight:600,marginBottom:4}}>Analysing your application history…</div>
        <div className="muted" style={{fontSize:12}}>Finding patterns across outcomes</div>
      </div>}
      {result&&(
        <div>
          {result.patterns_success?.length>0&&(
            <div className="card" style={{marginBottom:14}}>
              <div style={{fontFamily:'var(--mono)',fontSize:10,textTransform:'uppercase',letterSpacing:'.07em',color:'var(--green)',marginBottom:10}}>✅ Success Patterns</div>
              {result.patterns_success.map((p,i)=><div key={i} style={{display:'flex',gap:8,fontSize:13,marginBottom:6,lineHeight:1.55}}><span style={{color:'var(--green)',flexShrink:0}}>▸</span>{p}</div>)}
            </div>
          )}
          {result.patterns_failure?.length>0&&(
            <div className="card" style={{marginBottom:14}}>
              <div style={{fontFamily:'var(--mono)',fontSize:10,textTransform:'uppercase',letterSpacing:'.07em',color:'var(--red)',marginBottom:10}}>❌ Failure Patterns</div>
              {result.patterns_failure.map((p,i)=><div key={i} style={{display:'flex',gap:8,fontSize:13,marginBottom:6,lineHeight:1.55}}><span style={{color:'var(--red)',flexShrink:0}}>✕</span>{p}</div>)}
            </div>
          )}
          {result.keyword_impact?.length>0&&(
            <div className="card" style={{marginBottom:14}}>
              <div style={{fontFamily:'var(--mono)',fontSize:10,textTransform:'uppercase',letterSpacing:'.07em',color:'var(--muted)',marginBottom:10}}>🔑 Keyword Impact</div>
              {result.keyword_impact.map((k,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:10,marginBottom:7,flexWrap:'wrap'}}>
                  <span className="tag tag-b">{k.keyword}</span>
                  <span style={{fontSize:12,color:'var(--text2)',flex:1}}>{k.impact}</span>
                  {k.frequency&&<span className="muted" style={{fontFamily:'var(--mono)',fontSize:11}}>×{k.frequency}</span>}
                </div>
              ))}
            </div>
          )}
          {result.resume_version_performance?.length>0&&(
            <div className="card" style={{marginBottom:14}}>
              <div style={{fontFamily:'var(--mono)',fontSize:10,textTransform:'uppercase',letterSpacing:'.07em',color:'var(--muted)',marginBottom:10}}>📊 Version Performance</div>
              {result.resume_version_performance.map((v,i)=>(
                <div key={i} style={{marginBottom:10,padding:'10px 12px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6}}>
                  <div style={{fontWeight:600,fontSize:13,marginBottom:3}}>{v.version||v.name||'Version '+i}</div>
                  <div style={{fontSize:12,color:'var(--text2)'}}>{v.observation||v.performance}</div>
                </div>
              ))}
            </div>
          )}
          {result.recommendations?.length>0&&(
            <div className="card">
              <div style={{fontFamily:'var(--mono)',fontSize:10,textTransform:'uppercase',letterSpacing:'.07em',color:'var(--muted)',marginBottom:10}}>💡 Recommendations</div>
              {result.recommendations.map((r,i)=>(
                <div key={i} style={{display:'flex',gap:8,fontSize:13,marginBottom:8,lineHeight:1.55,background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,padding:'8px 12px'}}>
                  <span style={{color:'var(--accent)',flexShrink:0}}>→</span>{r}
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ──────────────────────────────────────────────────────────────
// PAGE: HISTORY
// ──────────────────────────────────────────────────────────────
function HistoryPage({cfg}){
  const [jobs,setJobs]=useState([]);
  const [loading,setLoading]=useState(true);
  const [open,setOpen]=useState({});
  const [remarks,setRemarks]=useState({});
  const [ri,setRi]=useState({});

  useEffect(()=>{
    if(!cfg.url)return;
    (async()=>{
      setLoading(true);
      try{
        const [r1,r2]=await Promise.all([
          fetch(cfg.url+'/rest/v1/resume_keywords?select=*&order=created_at.desc&limit=60',{headers:{apikey:cfg.key,'Authorization':'Bearer '+cfg.key}}),
          fetch(cfg.url+'/rest/v1/job_remarks?select=*&order=created_at.asc',{headers:{apikey:cfg.key,'Authorization':'Bearer '+cfg.key}})
        ]);
        const js=await r1.json(),rm=await r2.json();
        setJobs(Array.isArray(js)?js:[]);
        const rc={};(Array.isArray(rm)?rm:[]).forEach(r=>{if(!rc[r.job_id])rc[r.job_id]=[];rc[r.job_id].push(r);});
        setRemarks(rc);
      }catch(e){toast(e.message,'fail');}
      finally{setLoading(false);}
    })();
  },[cfg.url,cfg.key]);

  const avg=jobs.length?Math.round(jobs.reduce((a,j)=>a+(j.score||0),0)/jobs.length):0;

  const addRemark=async(jid)=>{
    const txt=(ri[jid]||'').trim();if(!txt)return;
    try{
      const r=await fetch(cfg.url+'/rest/v1/job_remarks',{method:'POST',
        headers:{apikey:cfg.key,'Authorization':'Bearer '+cfg.key,'Content-Type':'application/json','Prefer':'return=representation'},
        body:JSON.stringify({job_id:jid,text:txt})});
      const rows=await r.json();
      setRemarks(rm=>({...rm,[jid]:[...(rm[jid]||[]),rows[0]]}));
      setRi(x=>({...x,[jid]:''}));
    }catch(e){toast(e.message,'fail');}
  };

  const del=async(id)=>{
    if(!confirm('Delete?'))return;
    try{
      await fetch(cfg.url+'/rest/v1/job_remarks?job_id=eq.'+id,{method:'DELETE',headers:{apikey:cfg.key,'Authorization':'Bearer '+cfg.key}});
      await fetch(cfg.url+'/rest/v1/resume_keywords?id=eq.'+id,{method:'DELETE',headers:{apikey:cfg.key,'Authorization':'Bearer '+cfg.key}});
      setJobs(j=>j.filter(x=>x.id!==id));
    }catch(e){toast(e.message,'fail');}
  };

  return(
    <div>
      <div style={{marginBottom:20}}><h1 style={{fontSize:20,fontWeight:700,marginBottom:4}}>📊 Analysis History</h1><p className="muted" style={{fontSize:13}}>All saved JD analyses.</p></div>
      <div className="g4" style={{marginBottom:20}}>
        <div className="stat-card"><div className="stat-val">{jobs.length}</div><div className="stat-lbl">Analysed</div></div>
        <div className="stat-card"><div className="stat-val" style={{color:'var(--accent)'}}>{avg}%</div><div className="stat-lbl">Avg Score</div></div>
        <div className="stat-card"><div className="stat-val" style={{color:'var(--green)'}}>{jobs.filter(j=>j.score>=75).length}</div><div className="stat-lbl">Strong ≥75</div></div>
        <div className="stat-card"><div className="stat-val" style={{color:'var(--red)'}}>{jobs.filter(j=>j.score<50).length}</div><div className="stat-lbl">Weak &lt;50</div></div>
      </div>
      {loading&&<div className="muted pulse" style={{textAlign:'center',padding:40,fontSize:13}}>Loading…</div>}
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {jobs.map(j=>{
          const isOpen=!!open[j.id];
          return(
            <div className="card" style={{padding:0,overflow:'hidden',cursor:'pointer',transition:'border-color .15s'}} key={j.id}
              onMouseEnter={e=>e.currentTarget.style.borderColor='var(--accent)'}
              onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}>
              <div style={{display:'grid',gridTemplateColumns:'52px 1fr auto',gap:14,alignItems:'center',padding:'12px 16px'}} onClick={()=>setOpen(o=>({...o,[j.id]:!o[j.id]}))}>
                <div style={{width:48,height:48,borderRadius:10,background:scBg(j.score),border:`2px solid ${scBd(j.score)}`,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <span style={{fontFamily:'var(--mono)',fontWeight:700,fontSize:15,color:sc(j.score),lineHeight:1}}>{j.score||0}</span>
                  <span style={{fontFamily:'var(--mono)',fontSize:8,opacity:.6,marginTop:1}}>MATCH</span>
                </div>
                <div>
                  <div style={{fontWeight:600,fontSize:14,marginBottom:2}}>{j.role||'Unknown'}</div>
                  <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--accent)',marginBottom:3}}>{j.company||'—'}</div>
                  <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                    <span className="muted" style={{fontSize:11}}>{fmtDate(j.created_at)}</span>
                    <span style={{background:'var(--surface2)',padding:'1px 6px',borderRadius:3,fontFamily:'var(--mono)',fontSize:10,border:'1px solid var(--border)'}}>{relDate(j.created_at)}</span>
                  </div>
                </div>
                <div style={{display:'flex',gap:6}} onClick={e=>e.stopPropagation()}>
                  {j.job_url&&<a href={j.job_url} target="_blank" className="btn btn-xs btn-outline">↗</a>}
                  <button className="btn btn-xs btn-danger" onClick={()=>del(j.id)}>🗑</button>
                </div>
              </div>
              {isOpen&&(
                <div style={{borderTop:'1px solid var(--border)',padding:'14px 16px'}}>
                  <div className="g2" style={{marginBottom:10}}>
                    <div className="card-2"><div className="muted" style={{fontSize:11,marginBottom:5}}>✅ Matched</div><Tags items={j.matched} cls="tag-g" prefix="✓ "/></div>
                    <div className="card-2"><div className="muted" style={{fontSize:11,marginBottom:5}}>❌ Missing</div><Tags items={j.missing} cls="tag-r" prefix="✕ "/></div>
                  </div>
                  <div className="card-2">
                    <div className="muted" style={{fontSize:11,marginBottom:6}}>📝 Remarks</div>
                    {(remarks[j.id]||[]).map(rm=>(
                      <div key={rm.id} style={{display:'flex',gap:8,fontSize:12,marginBottom:5}}><span className="muted">{fmtDate(rm.created_at)}</span><span>{rm.text}</span></div>
                    ))}
                    <div style={{display:'flex',gap:8,marginTop:6}}>
                      <input className="input" style={{fontSize:12}} placeholder="Add remark…" value={ri[j.id]||''} onChange={e=>setRi(x=>({...x,[j.id]:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&addRemark(j.id)}/>
                      <button className="btn btn-outline btn-sm" onClick={()=>addRemark(j.id)}>+</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────
// PAGE: DASHBOARD
// ──────────────────────────────────────────────────────────────
function DashboardPage({cfg,onNav}){
  const [data,setData]=useState({resumes:[],jobs:[]});
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    if(!cfg.url)return;
    (async()=>{
      try{
        const [r1,r2]=await Promise.all([
          fetch(cfg.url+'/rest/v1/tracked_resumes?select=*&order=created_at.desc&limit=5',{headers:{apikey:cfg.key,'Authorization':'Bearer '+cfg.key}}),
          fetch(cfg.url+'/rest/v1/resume_keywords?select=*&order=created_at.desc&limit=5',{headers:{apikey:cfg.key,'Authorization':'Bearer '+cfg.key}})
        ]);
        setData({resumes:await r1.json()||[],jobs:await r2.json()||[]});
      }catch(_){}finally{setLoading(false);}
    })();
  },[cfg.url]);

  const rs=data.resumes||[];const js=data.jobs||[];
  const funnel={applied:rs.filter(r=>r.status==='applied').length,interview:rs.filter(r=>r.status==='interview').length,offer:rs.filter(r=>r.status==='offer').length};

  return(
    <div>
      <div style={{marginBottom:20}}>
        <h1 style={{fontSize:20,fontWeight:700,marginBottom:4}}>👋 Career OS</h1>
        <p className="muted" style={{fontSize:13}}>Your job search command centre.</p>
      </div>
      {!cfg.hasOrKey&&<div className="alert alert-err" style={{marginBottom:16}}><span className="alert-icon">⚠️</span><div><strong>OPENROUTER_API_KEY not set.</strong> Add it in Vercel → Settings → Environment Variables.</div></div>}

      <div className="g4" style={{marginBottom:20}}>
        <div className="stat-card" style={{cursor:'pointer'}} onClick={()=>onNav('tracker')}><div className="stat-val" style={{color:'var(--accent)'}}>{rs.length}</div><div className="stat-lbl">Tracked</div><div className="stat-sub">{funnel.applied} applied</div></div>
        <div className="stat-card" style={{cursor:'pointer'}} onClick={()=>onNav('tracker')}><div className="stat-val" style={{color:'var(--accent2)'}}>{funnel.interview}</div><div className="stat-lbl">Interviews</div><div className="stat-sub">{funnel.offer} offer{funnel.offer!==1?'s':''}</div></div>
        <div className="stat-card" style={{cursor:'pointer'}} onClick={()=>onNav('history')}><div className="stat-val">{js.length}+</div><div className="stat-lbl">Analysed</div></div>
        <div className="stat-card" style={{cursor:'pointer',background:'linear-gradient(135deg,rgba(37,99,235,.08),rgba(124,58,237,.06))',borderColor:'rgba(37,99,235,.2)'}} onClick={()=>onNav('analyzer')}>
          <div className="stat-val" style={{color:'var(--accent)'}}>⚡</div><div className="stat-lbl">Analyze JD</div><div className="stat-sub">Click to start</div>
        </div>
      </div>

      <div className="g2">
        <div>
          <div style={{fontWeight:600,fontSize:13,marginBottom:10,display:'flex',justifyContent:'space-between'}}>
            <span>Recent Resumes</span><button className="btn btn-ghost btn-xs" onClick={()=>onNav('tracker')}>View all →</button>
          </div>
          {loading?<div className="muted pulse" style={{fontSize:13}}>Loading…</div>:rs.length===0?<div className="muted" style={{fontSize:13,fontStyle:'italic'}}>No resumes yet. Run Analyzer to get started.</div>:
            rs.slice(0,4).map(r=>(
              <div key={r.id} className="card-sm" style={{marginBottom:8,cursor:'pointer'}} onClick={()=>onNav('tracker')}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <div style={{width:36,height:36,borderRadius:8,background:scBg(r.score),border:`1.5px solid ${scBd(r.score)}`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                    <span style={{fontFamily:'var(--mono)',fontWeight:700,fontSize:13,color:sc(r.score)}}>{r.score}</span>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.name||'Untitled'}</div>
                    <div className="muted" style={{fontSize:11}}>{r.company}{r.role?` · ${r.role}`:''}</div>
                  </div>
                  <StatusChip s={r.status}/>
                </div>
              </div>
            ))
          }
        </div>
        <div>
          <div style={{fontWeight:600,fontSize:13,marginBottom:10,display:'flex',justifyContent:'space-between'}}>
            <span>Recent Analyses</span><button className="btn btn-ghost btn-xs" onClick={()=>onNav('history')}>View all →</button>
          </div>
          {loading?<div className="muted pulse" style={{fontSize:13}}>Loading…</div>:js.length===0?<div className="muted" style={{fontSize:13,fontStyle:'italic'}}>No analyses yet.</div>:
            js.slice(0,4).map(j=>(
              <div key={j.id} className="card-sm" style={{marginBottom:8,cursor:'pointer'}} onClick={()=>onNav('history')}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <div style={{width:36,height:36,borderRadius:8,background:scBg(j.score),border:`1.5px solid ${scBd(j.score)}`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                    <span style={{fontFamily:'var(--mono)',fontWeight:700,fontSize:13,color:sc(j.score)}}>{j.score}</span>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{j.role||'Unknown'}</div>
                    <div className="muted" style={{fontSize:11}}>{j.company} · {relDate(j.created_at)}</div>
                  </div>
                </div>
              </div>
            ))
          }
        </div>
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────
// APP ROOT
// ──────────────────────────────────────────────────────────────
const NAV=[
  {id:'dashboard',icon:'🏠',label:'Dashboard'},
  {id:'analyzer',icon:'⚡',label:'Analyzer',sub:'Full Pipeline'},
  {id:'bulk',icon:'🚀',label:'Bulk Apply'},
  {id:'tracker',icon:'💼',label:'Tracker'},
  {id:'history',icon:'📊',label:'History'},
  {id:'learning',icon:'🔁',label:'Learning Loop'},
];

function App(){
  const [theme,toggleTheme]=useTheme();
  const cfg=useConfig();
  const [page,setPage]=useState('dashboard');
  const [mobileOpen,setMobileOpen]=useState(false);
  const [collapsed,setCollapsed]=useState(false);

  const nav=useCallback(p=>{setPage(p);setMobileOpen(false);},[]);
  const curNav=NAV.find(n=>n.id===page);

  return(
    <div className="layout">
      {/* Sidebar overlay (mobile) */}
      <div className={`sidebar-mobile-overlay${mobileOpen?' show':''}`} onClick={()=>setMobileOpen(false)}/>

      {/* Sidebar */}
      <aside className={`sidebar${collapsed?' collapsed':''}${mobileOpen?' mobile-open':''}`}>
        <div className="sb-header">
          <div className="sb-logo">CO</div>
          <div className="sb-title">Career<span>OS</span></div>
        </div>
        <nav className="sb-nav">
          {NAV.map(n=>(
            <button key={n.id} className={`sb-item${page===n.id?' active':''}`} title={collapsed?n.label:''} onClick={()=>nav(n.id)}>
              <span className="sb-item-icon">{n.icon}</span>
              <span className="sb-item-label">{n.label}</span>
            </button>
          ))}
        </nav>
        <div className="sb-bottom">
          <button className="sb-collapse-btn" onClick={toggleTheme} title={collapsed?'Toggle theme':''}>
            <span>{theme==='dark'?'☀️':'🌙'}</span>
            <span className="sb-collapse-label">{theme==='dark'?'Light':'Dark'} Mode</span>
          </button>
          <button className="sb-collapse-btn" onClick={()=>setCollapsed(c=>!c)} style={{display:'none'}} id="collapse-btn">
            <span>{collapsed?'→':'←'}</span>
            <span className="sb-collapse-label">Collapse</span>
          </button>
        </div>
      </aside>

      {/* Main */}
      <div className="main" style={{marginLeft:collapsed?56:0}}>
        <header className="topbar">
          <button className="hamburger" onClick={()=>setMobileOpen(m=>!m)} aria-label="Menu">
            <span/><span/><span/>
          </button>
          <div className="topbar-page-title">{curNav?.icon} {curNav?.label}</div>
          <div className="topbar-actions">
            <div className={`or-pill${cfg.hasOrKey?' ok':' fail'}`}>
              <div className="or-dot"/>
              <span>{cfg.hasOrKey?'OR Connected':'OR Key Missing'}</span>
            </div>
          </div>
        </header>
        <div className="content">
          {page==='dashboard'&&<DashboardPage cfg={cfg} onNav={nav}/>}
          {page==='analyzer'&&<AnalyzerPage cfg={cfg}/>}
          {page==='bulk'&&<BulkApplyPage/>}
          {page==='tracker'&&<TrackerPage cfg={cfg}/>}
          {page==='history'&&<HistoryPage cfg={cfg}/>}
          {page==='learning'&&<LearningPage cfg={cfg}/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
