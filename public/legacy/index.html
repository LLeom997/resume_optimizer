<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Career OS — Resume Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
/* ── DESIGN TOKENS ─────────────────────────────────────────── */
:root{
  --bg:#f3f5fb;--surface:#fff;--surface2:#f0f3fa;--surface3:#e8ecf5;
  --border:#e0e6f0;--border2:#d0d8ec;
  --accent:#2563eb;--accent2:#7c3aed;--accent3:#0891b2;
  --green:#059669;--red:#dc2626;--yellow:#d97706;--orange:#ea580c;
  --text:#0f172a;--text2:#334155;--muted:#64748b;--muted2:#94a3b8;
  --shadow-xs:0 1px 3px rgba(0,0,0,.06);
  --shadow-sm:0 2px 8px rgba(0,0,0,.08);
  --shadow:0 4px 20px rgba(0,0,0,.10);
  --shadow-lg:0 12px 48px rgba(0,0,0,.14);
  --r:10px;--r-sm:6px;--r-lg:14px;
  --font:'Google Sans',system-ui,sans-serif;
  --mono:'DM Mono',monospace;
  --sidebar:240px;
  --topbar:54px;
}
[data-theme="dark"]{
  --bg:#080e1a;--surface:#0f1825;--surface2:#131f30;--surface3:#1a2a3f;
  --border:#1e2d45;--border2:#253550;
  --accent:#3b82f6;--accent2:#8b5cf6;--accent3:#06b6d4;
  --green:#10b981;--red:#ef4444;--yellow:#f59e0b;--orange:#f97316;
  --text:#f1f5f9;--text2:#cbd5e1;--muted:#64748b;--muted2:#475569;
  --shadow-xs:0 1px 3px rgba(0,0,0,.25);
  --shadow-sm:0 2px 8px rgba(0,0,0,.35);
  --shadow:0 4px 20px rgba(0,0,0,.45);
  --shadow-lg:0 12px 48px rgba(0,0,0,.55);
}
/* ── BASE ──────────────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box;}
html,body,#root{height:100%;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;transition:background .2s,color .2s;}
button,input,select,textarea{font-family:var(--font);}
a{text-decoration:none;color:inherit;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px;}
/* ── LAYOUT ────────────────────────────────────────────────── */
.layout{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:relative;z-index:50;transition:transform .25s ease,width .25s ease;overflow:hidden;}
.sidebar.collapsed{width:56px;}
.sidebar-mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:49;backdrop-filter:blur(2px);}
@media(max-width:768px){
  .sidebar{position:fixed;top:0;left:0;height:100%;transform:translateX(-100%);width:var(--sidebar)!important;}
  .sidebar.mobile-open{transform:translateX(0);}
  .sidebar-mobile-overlay.show{display:block;}
  .main{margin-left:0!important;}
}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;transition:margin-left .25s ease;}
.topbar{height:var(--topbar);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;box-shadow:var(--shadow-xs);}
.content{flex:1;overflow-y:auto;padding:24px;}
@media(max-width:640px){.content{padding:14px;}}
/* ── SIDEBAR INTERNALS ─────────────────────────────────────── */
.sb-header{padding:14px 14px 10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);min-height:54px;}
.sb-logo{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:12px;flex-shrink:0;letter-spacing:-.5px;}
.sb-title{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;}
.sb-title span{color:var(--accent);}
.sidebar.collapsed .sb-title{display:none;}
.sb-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:1px;overflow-y:auto;}
.sb-section{font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--muted2);padding:12px 8px 4px;text-transform:uppercase;white-space:nowrap;overflow:hidden;}
.sidebar.collapsed .sb-section{opacity:0;pointer-events:none;}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r-sm);color:var(--muted);font-size:13px;font-weight:500;border:none;background:none;width:100%;text-align:left;cursor:pointer;transition:all .15s;white-space:nowrap;overflow:hidden;position:relative;}
.sb-item:hover{background:var(--surface2);color:var(--text);}
.sb-item.active{background:linear-gradient(135deg,rgba(37,99,235,.12),rgba(124,58,237,.08));color:var(--accent);font-weight:600;}
[data-theme="dark"] .sb-item.active{background:linear-gradient(135deg,rgba(59,130,246,.15),rgba(139,92,246,.1));}
.sb-item-icon{font-size:16px;flex-shrink:0;width:18px;text-align:center;}
.sb-item-label{overflow:hidden;text-overflow:ellipsis;}
.sidebar.collapsed .sb-item-label{display:none;}
.sb-item-badge{font-family:var(--mono);font-size:9px;padding:2px 5px;border-radius:10px;background:var(--accent);color:#fff;margin-left:auto;flex-shrink:0;}
.sidebar.collapsed .sb-item-badge{display:none;}
.sb-bottom{padding:10px 8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:4px;}
.sb-collapse-btn{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r-sm);border:none;background:none;color:var(--muted);cursor:pointer;font-size:12px;width:100%;transition:all .15s;}
.sb-collapse-btn:hover{background:var(--surface2);color:var(--text);}
.sidebar.collapsed .sb-collapse-label{display:none;}
/* ── TOPBAR ────────────────────────────────────────────────── */
.hamburger{display:none;flex-direction:column;gap:4.5px;padding:7px;border:none;background:none;cursor:pointer;border-radius:var(--r-sm);}
.hamburger:hover{background:var(--surface2);}
.hamburger span{display:block;width:18px;height:1.5px;background:var(--text);border-radius:2px;}
@media(max-width:768px){.hamburger{display:flex;}}
.topbar-page-title{font-weight:600;font-size:15px;flex:1;}
.topbar-actions{display:flex;align-items:center;gap:8px;margin-left:auto;}
.or-pill{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:20px;font-weight:500;}
.or-pill.ok{background:rgba(5,150,105,.1);border:1px solid rgba(5,150,105,.25);color:var(--green);}
.or-pill.fail{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.25);color:var(--red);}
.or-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.or-pill.ok .or-dot{background:var(--green);}
.or-pill.fail .or-dot{background:var(--red);}
/* ── CARDS ─────────────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--shadow-xs);}
.card-sm{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;}
.card-2{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;}
.card-accent{background:linear-gradient(135deg,rgba(37,99,235,.06),rgba(124,58,237,.04));border:1px solid rgba(37,99,235,.2);border-radius:var(--r);padding:16px;}
/* ── BUTTONS ───────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:var(--r-sm);border:1px solid transparent;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;line-height:1;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;box-shadow:0 2px 8px rgba(37,99,235,.25);}
.btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 16px rgba(37,99,235,.35);}
.btn-outline{border-color:var(--border2);background:var(--surface);color:var(--text2);}
.btn-outline:hover:not(:disabled){border-color:var(--accent);color:var(--accent);background:var(--surface);}
.btn-ghost{border-color:transparent;background:transparent;color:var(--muted);}
.btn-ghost:hover:not(:disabled){background:var(--surface2);color:var(--text);}
.btn-danger{border-color:rgba(220,38,38,.3);color:var(--red);}
.btn-danger:hover:not(:disabled){background:rgba(220,38,38,.06);}
.btn-success{border-color:rgba(5,150,105,.3);color:var(--green);background:rgba(5,150,105,.05);}
.btn-success:hover:not(:disabled){background:rgba(5,150,105,.1);}
.btn-sm{padding:5px 11px;font-size:12px;gap:5px;}
.btn-xs{padding:3px 8px;font-size:11px;gap:4px;}
.btn-icon{width:32px;height:32px;padding:0;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:14px;}
.btn-icon:hover{border-color:var(--accent);color:var(--accent);}
/* ── FORM ──────────────────────────────────────────────────── */
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);}
.input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);padding:9px 12px;font-size:13px;outline:none;transition:border-color .15s,box-shadow .15s;width:100%;}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12);}
.input::placeholder{color:var(--muted2);}
select.input{cursor:pointer;}
textarea.input{resize:vertical;min-height:100px;line-height:1.65;}
/* ── GRID ──────────────────────────────────────────────────── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
@media(max-width:900px){.g3{grid-template-columns:1fr 1fr;}.g4{grid-template-columns:1fr 1fr;}}
@media(max-width:640px){.g2,.g3,.g4{grid-template-columns:1fr;}}
/* ── STAT CARDS ────────────────────────────────────────────── */
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow-xs);}
.stat-val{font-size:26px;font-weight:700;line-height:1;margin-bottom:3px;}
.stat-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;}
.stat-sub{font-size:12px;color:var(--muted);margin-top:3px;}
/* ── SCORE RING ────────────────────────────────────────────── */
.ring-wrap{position:relative;flex-shrink:0;}
.ring-svg{transform:rotate(-90deg);display:block;}
.ring-bg{fill:none;stroke:var(--border);stroke-width:8;}
.ring-fg{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1.1s cubic-bezier(.4,0,.2,1);}
.ring-lbl{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-num{font-weight:800;line-height:1;}
.ring-sub{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.05em;margin-top:1px;}
/* ── TAGS ──────────────────────────────────────────────────── */
.tags{display:flex;flex-wrap:wrap;gap:5px;}
.tag{font-family:var(--mono);font-size:11px;padding:3px 8px;border-radius:4px;font-weight:500;line-height:1.3;}
.tag-g{background:rgba(5,150,105,.1);border:1px solid rgba(5,150,105,.22);color:var(--green);}
.tag-r{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.2);color:var(--red);}
.tag-y{background:rgba(217,119,6,.1);border:1px solid rgba(217,119,6,.2);color:var(--yellow);}
.tag-b{background:rgba(37,99,235,.1);border:1px solid rgba(37,99,235,.2);color:var(--accent);}
.tag-p{background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.2);color:var(--accent2);}
.tag-c{background:rgba(8,145,178,.1);border:1px solid rgba(8,145,178,.2);color:var(--accent3);}
[data-theme="dark"] .tag-g{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.25);}
[data-theme="dark"] .tag-r{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.22);}
[data-theme="dark"] .tag-y{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.22);}
/* ── CHIPS ─────────────────────────────────────────────────── */
.chip{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;white-space:nowrap;line-height:1.4;}
.chip-draft{background:rgba(100,116,139,.1);color:var(--muted);border:1px solid rgba(100,116,139,.2);}
.chip-ready{background:rgba(37,99,235,.1);color:var(--accent);border:1px solid rgba(37,99,235,.22);}
.chip-applied{background:rgba(217,119,6,.1);color:var(--yellow);border:1px solid rgba(217,119,6,.22);}
.chip-interview{background:rgba(124,58,237,.1);color:var(--accent2);border:1px solid rgba(124,58,237,.22);}
.chip-offer{background:rgba(5,150,105,.1);color:var(--green);border:1px solid rgba(5,150,105,.22);}
.chip-rejected{background:rgba(220,38,38,.1);color:var(--red);border:1px solid rgba(220,38,38,.22);}
/* ── PROGRESS / BAR ────────────────────────────────────────── */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:7px;}
.bar-lbl{font-family:var(--mono);font-size:11px;color:var(--muted);flex-shrink:0;width:130px;}
.bar-track{flex:1;height:4px;background:var(--surface3);border-radius:10px;overflow:hidden;}
.bar-fill{height:100%;border-radius:10px;transition:width 1s cubic-bezier(.4,0,.2,1);}
.bar-val{font-family:var(--mono);font-size:11px;width:28px;text-align:right;}
/* ── DECISION BANNER ───────────────────────────────────────── */
.decision-yes{background:linear-gradient(135deg,rgba(5,150,105,.1),rgba(8,145,178,.08));border:1px solid rgba(5,150,105,.3);border-radius:var(--r);padding:16px 20px;}
.decision-no{background:linear-gradient(135deg,rgba(220,38,38,.08),rgba(234,88,12,.06));border:1px solid rgba(220,38,38,.25);border-radius:var(--r);padding:16px 20px;}
.decision-maybe{background:linear-gradient(135deg,rgba(217,119,6,.08),rgba(234,88,12,.06));border:1px solid rgba(217,119,6,.25);border-radius:var(--r);padding:16px 20px;}
.decision-label{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px;}
.decision-conf{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:8px;}
/* ── PATCH CARD ────────────────────────────────────────────── */
.patch-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:8px;}
.patch-before{font-size:12px;color:var(--muted);text-decoration:line-through;line-height:1.55;margin-bottom:5px;}
.patch-after{font-size:13px;color:var(--text);border-left:2px solid var(--accent);padding:3px 10px;line-height:1.6;border-radius:0 4px 4px 0;background:rgba(37,99,235,.04);}
.patch-meta{display:flex;gap:8px;align-items:center;margin-bottom:6px;flex-wrap:wrap;}
.impact-badge{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;}
.impact-ats{background:rgba(37,99,235,.12);color:var(--accent);}
.impact-keyword{background:rgba(124,58,237,.12);color:var(--accent2);}
.impact-clarity{background:rgba(8,145,178,.12);color:var(--accent3);}
/* ── DROPZONE ──────────────────────────────────────────────── */
.dz{border:2px dashed var(--border2);border-radius:var(--r);padding:22px 16px;text-align:center;cursor:pointer;transition:all .2s;position:relative;background:var(--surface2);}
.dz:hover,.dz.over{border-color:var(--accent);background:rgba(37,99,235,.03);}
.dz.filled{border-color:var(--green);background:rgba(5,150,105,.04);}
.dz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.dz-icon{font-size:26px;margin-bottom:7px;}
.dz-lbl{font-weight:600;font-size:13px;margin-bottom:3px;}
.dz-hint{font-size:12px;color:var(--muted);}
/* ── STEP PROGRESS ─────────────────────────────────────────── */
.pipeline-steps{display:flex;align-items:center;gap:0;margin-bottom:24px;overflow-x:auto;padding-bottom:4px;}
.step{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:500;white-space:nowrap;}
.step-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:700;flex-shrink:0;transition:all .2s;}
.step.done .step-num{background:var(--green);color:#fff;}
.step.active .step-num{background:var(--accent);color:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.2);}
.step.pending .step-num{background:var(--surface3);color:var(--muted);border:1px solid var(--border2);}
.step.done .step-lbl{color:var(--green);}
.step.active .step-lbl{color:var(--text);font-weight:600;}
.step.pending .step-lbl{color:var(--muted);}
.step-line{flex:1;height:1px;background:var(--border2);margin:0 8px;min-width:16px;}
.step-line.done{background:var(--green);}
/* ── VARIANT TABS ──────────────────────────────────────────── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px;}
.tab{padding:9px 16px;font-size:13px;font-weight:500;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab:hover:not(.active){color:var(--text);}
/* ── ALERT ─────────────────────────────────────────────────── */
.alert{padding:10px 14px;border-radius:var(--r-sm);font-size:13px;line-height:1.55;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start;}
.alert-icon{flex-shrink:0;font-size:14px;}
.alert-err{background:rgba(220,38,38,.07);border:1px solid rgba(220,38,38,.22);color:var(--red);}
.alert-ok{background:rgba(5,150,105,.07);border:1px solid rgba(5,150,105,.22);color:var(--green);}
.alert-info{background:rgba(37,99,235,.06);border:1px solid rgba(37,99,235,.18);color:var(--accent);}
.alert-warn{background:rgba(217,119,6,.07);border:1px solid rgba(217,119,6,.22);color:var(--yellow);}
/* ── MODAL ─────────────────────────────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px);}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.modal-title{font-size:16px;font-weight:700;margin-bottom:18px;}
/* ── MISC ──────────────────────────────────────────────────── */
.divider{height:1px;background:var(--border);margin:16px 0;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;}
.spinner-b{border-color:rgba(37,99,235,.2);border-top-color:var(--accent);}
@keyframes spin{to{transform:rotate(360deg);}}
.pulse{animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.4;}50%{opacity:1;}}
.mono{font-family:var(--mono);}
.muted{color:var(--muted);}
.text2{color:var(--text2);}
.ellipsis{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pre-wrap{white-space:pre-wrap;}
/* ── TOAST ─────────────────────────────────────────────────── */
#toast-root{position:fixed;bottom:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px;}
.toast-item{padding:10px 16px;border-radius:9px;font-size:13px;font-weight:500;box-shadow:var(--shadow);animation:toastIn .2s ease;max-width:300px;display:flex;gap:8px;align-items:center;}
.toast-ok{background:var(--surface);border:1px solid var(--green);color:var(--green);}
.toast-fail{background:var(--surface);border:1px solid var(--red);color:var(--red);}
.toast-info{background:var(--surface);border:1px solid var(--border2);color:var(--text2);}
@keyframes toastIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
/* ── SCORE COLORS ──────────────────────────────────────────── */
.score-hi{color:var(--green);}
.score-md{color:var(--yellow);}
.score-lo{color:var(--red);}
</style>
</head>
<body>
<div id="root"></div>
<div id="toast-root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

// ─── UTILS ────────────────────────────────────────────────────
const sc=v=>v>=75?'var(--green)':v>=50?'var(--yellow)':'var(--red)';
const scBg=v=>v>=75?'rgba(5,150,105,.15)':v>=50?'rgba(217,119,6,.15)':'rgba(220,38,38,.15)';
const scBd=v=>v>=75?'rgba(5,150,105,.4)':v>=50?'rgba(217,119,6,.4)':'rgba(220,38,38,.4)';
const scClass=v=>v>=75?'score-hi':v>=50?'score-md':'score-lo';
const relDate=iso=>{if(!iso)return'';const d=Math.floor((Date.now()-new Date(iso))/86400000);if(d===0)return'Today';if(d===1)return'Yesterday';if(d<7)return d+'d ago';if(d<30)return Math.floor(d/7)+'w ago';return Math.floor(d/30)+'mo ago';};
const fmtDate=iso=>iso?new Date(iso).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}):'—';
const tryJson=raw=>{try{const m=(raw||'').replace(/```json|```/g,'').trim().match(/\{[\s\S]*\}/);return JSON.parse(m?m[0]:raw);}catch{return null;}};

let _tid=0;
function toast(msg,type='ok'){
  const id=++_tid;
  const el=document.createElement('div');
  el.className=`toast-item toast-${type}`;
  el.innerHTML=`<span>${type==='ok'?'✅':type==='fail'?'❌':'ℹ️'}</span><span>${msg}</span>`;
  el.id='t'+id;
  document.getElementById('toast-root').appendChild(el);
  setTimeout(()=>el.remove(),3500);
}

// ─── THEME ────────────────────────────────────────────────────
function useTheme(){
  const [t,setT]=useState(()=>localStorage.getItem('cos-theme')||'light');
  useEffect(()=>{document.documentElement.setAttribute('data-theme',t);localStorage.setItem('cos-theme',t);},[t]);
  return [t,()=>setT(x=>x==='dark'?'light':'dark')];
}

// ─── CONFIG ───────────────────────────────────────────────────
function useConfig(){
  const [cfg,setCfg]=useState({url:'',key:'',hasOrKey:false});
  useEffect(()=>{fetch('/api/config').then(r=>r.json()).then(setCfg).catch(()=>{});},[]);
  return cfg;
}

// ─── SCORE RING ───────────────────────────────────────────────
function Ring({score,size=90}){
  const r=40,c=2*Math.PI*r,off=c-((score||0)/100)*c;
  const color=sc(score||0);
  return(
    <div className="ring-wrap" style={{width:size,height:size}}>
      <svg className="ring-svg" width={size} height={size} viewBox="0 0 100 100">
        <circle className="ring-bg" cx="50" cy="50" r={r}/>
        <circle className="ring-fg" cx="50" cy="50" r={r} stroke={color} strokeDasharray={c} strokeDashoffset={off}/>
      </svg>
      <div className="ring-lbl">
        <span className="ring-num" style={{color,fontSize:size>80?22:15}}>{score||0}</span>
        <span className="ring-sub">SCORE</span>
      </div>
    </div>
  );
}

// ─── DROPZONE ─────────────────────────────────────────────────
function DZ({icon,label,hint,value,onChange}){
  const [over,setOver]=useState(false);
  const load=f=>{if(!f)return;const r=new FileReader();r.onload=e=>onChange(e.target.result,f.name);r.readAsText(f);};
  return(
    <div className={`dz${over?' over':''}${value?' filled':''}`}
      onDragOver={e=>{e.preventDefault();setOver(true);}}
      onDragLeave={()=>setOver(false)}
      onDrop={e=>{e.preventDefault();setOver(false);load(e.dataTransfer.files[0]);}}>
      <input type="file" accept=".txt,.md" onChange={e=>load(e.target.files[0])}/>
      <div className="dz-icon">{value?'✅':icon}</div>
      <div className="dz-lbl">{value?'Loaded ✓':label}</div>
      <div className="dz-hint">{value||hint}</div>
    </div>
  );
}

// ─── TAG LIST ─────────────────────────────────────────────────
function Tags({items,cls='tag-b',prefix='',max=15}){
  if(!items?.length)return<span className="muted" style={{fontSize:12,fontStyle:'italic'}}>None</span>;
  return<div className="tags">
    {items.slice(0,max).map((k,i)=><span key={i} className={`tag ${cls}`}>{prefix}{k}</span>)}
    {items.length>max&&<span className="tag" style={{background:'var(--surface3)',border:'1px solid var(--border)',color:'var(--muted)'}}>+{items.length-max}</span>}
  </div>;
}

// ─── STATUS CHIP ──────────────────────────────────────────────
const SM={draft:'Draft',ready:'Ready',applied:'Applied',interview:'Interview',offer:'Offer 🎉',rejected:'Rejected'};
const StatusChip=({s})=><span className={`chip chip-${s||'draft'}`}>{SM[s]||'Draft'}</span>;

// ─── DECISION BANNER ──────────────────────────────────────────
function DecisionBanner({fd}){
  if(!fd)return null;
  const dec=fd.decision?.toUpperCase();
  const cls=dec==='YES'?'decision-yes':dec==='NO'?'decision-no':'decision-maybe';
  const icon=dec==='YES'?'✅':dec==='NO'?'❌':'⚠️';
  return(
    <div className={cls}>
      <div className="decision-label">{icon} {dec==='YES'?'APPLY':'NO'==='NO'?'SKIP':'MAYBE'}</div>
      <div className="decision-conf">Confidence: {fd.confidence||0}%</div>
      <div style={{fontSize:13,lineHeight:1.65,marginBottom:8}}>{fd.reasoning}</div>
      {fd.risk_factors?.length>0&&<div style={{marginBottom:8}}>
        <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--muted)',marginBottom:4,textTransform:'uppercase',letterSpacing:'.06em'}}>Risk Factors</div>
        {fd.risk_factors.map((r,i)=><div key={i} style={{fontSize:12,color:'var(--red)',display:'flex',gap:6,marginBottom:3}}><span>⚠</span>{r}</div>)}
      </div>}
      {fd.upside?.length>0&&<div style={{marginBottom:8}}>
        <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--muted)',marginBottom:4,textTransform:'uppercase',letterSpacing:'.06em'}}>Upside</div>
        {fd.upside.map((u,i)=><div key={i} style={{fontSize:12,color:'var(--green)',display:'flex',gap:6,marginBottom:3}}><span>↑</span>{u}</div>)}
      </div>}
      {fd.quick_fixes_before_apply?.length>0&&<div>
        <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--muted)',marginBottom:4,textTransform:'uppercase',letterSpacing:'.06em'}}>Quick Fixes Before Apply</div>
        {fd.quick_fixes_before_apply.map((f,i)=><div key={i} style={{fontSize:12,color:'var(--yellow)',display:'flex',gap:6,marginBottom:3}}><span>→</span>{f}</div>)}
      </div>}
    </div>
  );
}

// ─── PATCH CARD ───────────────────────────────────────────────
function PatchCard({p,idx}){
  const impactCls=p.impact==='ATS'?'impact-ats':p.impact==='clarity'?'impact-clarity':'impact-keyword';
  return(
    <div className="patch-card">
      <div className="patch-meta">
        <span style={{fontFamily:'var(--mono)',fontWeight:700,fontSize:11,color:'var(--muted)'}}>#{idx+1}</span>
        <span style={{fontFamily:'var(--mono)',fontSize:10,background:'var(--surface)',border:'1px solid var(--border)',borderRadius:3,padding:'1px 6px',color:'var(--muted)'}}>{p.section||p.line_section||'—'}</span>
        {p.impact&&<span className={`impact-badge ${impactCls}`}>{p.impact}</span>}
        <span className="muted" style={{fontSize:11}}>{p.reason||p.impact_description}</span>
      </div>
      <div className="patch-before">{p.before||p.original||'—'}</div>
      <div className="patch-after">{p.after||p.revised||'—'}</div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────
// PAGE: ANALYZER  (Master pipeline)
// ──────────────────────────────────────────────────────────────
const PIPELINE=[
  {id:'upload',label:'Upload'},
  {id:'intake',label:'JD Intake'},
  {id:'memory',label:'Resume Map'},
  {id:'analyze',label:'Fit Analysis'},
  {id:'patches',label:'Suggestions'},
  {id:'strategy',label:'Strategy'},
];

function AnalyzerPage({cfg}){
  const [resume,setResume]=useState('');
  const [jd,setJd]=useState('');
  const [jobUrl,setJobUrl]=useState('');
  const [step,setStep]=useState(0); // index into pipeline
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');
  const [jdMeta,setJdMeta]=useState(null);
  const [resumeMem,setResumeMem]=useState(null);
  const [analysis,setAnalysis]=useState(null);
  const [patches,setPatches]=useState(null);
  const [strategy,setStrategy]=useState(null);
  const [activeVariant,setActiveVariant]=useState(0);
  const [extCompany,setExtCompany]=useState('');
  const [extRole,setExtRole]=useState('');
  const [saved,setSaved]=useState(false);

  const call=async(route,body)=>{
    const r=await fetch(route,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json();
    if(!r.ok)throw new Error(d.error||'Error '+r.status);
    return d;
  };

  const runPipeline=async()=>{
    if(!resume.trim())return setErr('Paste or upload your resume.');
    if(!jd.trim())return setErr('Paste or upload the job description.');
    setErr('');setLoading(true);
    try{
      // Stage 1: JD Intake
      setStep(1);
      const meta=await call('/api/jd-intake',{jd:jd.slice(0,4000)});
      setJdMeta(meta);setExtCompany(meta.company||'');setExtRole(meta.role||'');

      // Stage 2: Resume Memory
      setStep(2);
      const mem=await call('/api/resume-memory',{resume:resume.slice(0,6000)});
      setResumeMem(mem);

      // Stage 3: Full Analysis + Fit Decision
      setStep(3);
      const ana=await call('/api/proxy',{resume:resume.slice(0,6000),jd:jd.slice(0,3000),mode:'full'});
      setAnalysis(ana);
      if(ana.company)setExtCompany(ana.company);
      if(ana.role)setExtRole(ana.role);

      // Stage 4: Micro-diff patches
      setStep(4);
      const missing=(ana.missingKeywords||[]).join(', ');
      const matched=(ana.matchedKeywords||[]).join(', ');
      const patchData=await call('/api/proxy-raw',{type:'opt-propose',
        resume:resume.slice(0,6000),jd:jd.slice(0,3000),missing,matched});
      const parsedP=tryJson(patchData.text)||{};
      setPatches({patches:parsedP.patches||[],summary:parsedP.summary||'',lines:patchData.lines||resume.split('\n')});

      // Stage 5: Application strategy
      setStep(5);
      const strat=await call('/api/apply-strategy',{
        score:ana.score,fit:ana.fit_decision,
        company:extCompany,role:extRole,
        missing:ana.missingKeywords||[],
        strengths:ana.strengths||[]
      });
      setStrategy(strat);

      setStep(6);setSaved(false);
    }catch(e){setErr(e.message);setLoading(false);return;}
    setLoading(false);
  };

  const saveToTracker=async()=>{
    if(!analysis||!cfg.url)return;
    try{
      const sugTxt=patches?.patches?.map((p,i)=>`#${i+1} [${p.section||'—'}]: ${p.reason||''}\nBEFORE: ${p.before||p.original||''}\nAFTER: ${p.after||p.revised||''}`).join('\n\n')||null;
      const payload={name:`${extCompany||'Co'} — ${extRole||'Role'}`,company:extCompany,role:extRole,
        job_url:jobUrl||null,score:analysis.score,score_title:analysis.scoreTitle,
        matched_keywords:analysis.matchedKeywords||[],missing_keywords:analysis.missingKeywords||[],
        suggestions:sugTxt,jd_snippet:jd.slice(0,400),status:'draft',created_at:new Date().toISOString()};
      const res=await fetch(cfg.url+'/rest/v1/tracked_resumes',{method:'POST',
        headers:{apikey:cfg.key,'Authorization':'Bearer '+cfg.key,'Content-Type':'application/json','Prefer':'return=minimal'},
        body:JSON.stringify(payload)});
      if(!res.ok)throw new Error('Supabase '+res.status);
      toast('✅ Saved to Tracker!');setSaved(true);
    }catch(e){toast(e.message,'fail');}
  };

  const STEPS=PIPELINE;
  const done=i=>i<step&&!loading||(i<step);
  const active=i=>i===step&&loading&&step>0;

  return(
    <div>
      <div style={{marginBottom:20}}>
        <h1 style={{fontSize:20,fontWeight:700,marginBottom:4}}>⚡ Career OS — Analyzer</h1>
        <p className="muted" style={{fontSize:13}}>Full pipeline: JD intake → resume mapping → fit score → patches → strategy.</p>
      </div>

      {/* Pipeline steps */}
      <div className="pipeline-steps">
        {STEPS.map((s,i)=>(
          <React.Fragment key={i}>
            <div className={`step ${done(i)?'done':active(i)?'active':'pending'}`}>
              <div className="step-num">{done(i)?'✓':i+1}</div>
              <span className="step-lbl">{s.label}</span>
            </div>
            {i<STEPS.length-1&&<div className={`step-line${done(i)?' done':''}`}/>}
          </React.Fragment>
        ))}
      </div>

      {err&&<div className="alert alert-err"><span className="alert-icon">⚠️</span>{err}</div>}

      {/* Upload stage */}
      {step===0&&(
        <div>
          <div className="g2" style={{marginBottom:14}}>
            <div>
              <div style={{fontWeight:600,fontSize:13,marginBottom:8}}>📄 Resume</div>
              <DZ icon="📄" label="Drop resume" hint="TXT / MD — or paste below" value={resume} onChange={(t)=>setResume(t)}/>
              <textarea className="input" style={{marginTop:8,minHeight:130,fontFamily:'var(--mono)',fontSize:12}} placeholder="Or paste resume text…" value={resume} onChange={e=>setResume(e.target.value)}/>
            </div>
            <div>
              <div style={{fontWeight:600,fontSize:13,marginBottom:8}}>📋 Job Description</div>
              <DZ icon="📋" label="Drop JD" hint="TXT / MD — or paste below" value={jd} onChange={(t)=>setJd(t)}/>
              <textarea className="input" style={{marginTop:8,minHeight:130,fontSize:13}} placeholder="Or paste JD text…" value={jd} onChange={e=>setJd(e.target.value)}/>
            </div>
          </div>
          <div className="field" style={{maxWidth:380,marginBottom:16}}>
            <label>Job URL (optional)</label>
            <input className="input" value={jobUrl} onChange={e=>setJobUrl(e.target.value)} placeholder="https://linkedin.com/jobs/…"/>
          </div>
          <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:'12px',fontSize:14}} onClick={runPipeline} disabled={loading||!resume||!jd}>
            🚀 Run Full Pipeline
          </button>
        </div>
      )}

      {/* Loading */}
      {loading&&(
        <div className="card" style={{textAlign:'center',padding:'44px 24px'}}>
          <div className="spinner spinner-b" style={{width:32,height:32,margin:'0 auto 14px'}}/>
          <div style={{fontWeight:600,marginBottom:5}}>Running {PIPELINE[step]?.label}…</div>
          <div className="muted" style={{fontSize:12}}>Stage {step} of {PIPELINE.length-1}</div>
        </div>
      )}

      {/* Results */}
      {!loading&&step===6&&analysis&&(
        <div>
          {/* Extract bar */}
          <div className="card" style={{marginBottom:14}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,flexWrap:'wrap',marginBottom:12}}>
              <span style={{fontFamily:'var(--mono)',fontSize:10,textTransform:'uppercase',letterSpacing:'.07em',color:'var(--muted)'}}>Extracted — edit if wrong</span>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {!saved?<button className="btn btn-outline btn-sm" onClick={saveToTracker}>💾 Save to Tracker</button>
                  :<button className="btn btn-success btn-sm">✅ Saved</button>}
                <button className="btn btn-ghost btn-sm" onClick={()=>{setStep(0);setAnalysis(null);setPatches(null);setStrategy(null);setJdMeta(null);setResumeMem(null);}}>↺ Reset</button>
              </div>
            </div>
            <div className="g2">
              <div className="field"><label>Company</label><input className="input" value={extCompany} onChange={e=>setExtCompany(e.target.value)}/></div>
              <div className="field"><label>Role</label><input className="input" value={extRole} onChange={e=>setExtRole(e.target.value)}/></div>
            </div>
          </div>

          {/* Should I Apply decision */}
          {analysis.fit_decision&&<div style={{marginBottom:14}}><DecisionBanner fd={analysis.fit_decision}/></div>}

          {/* Score + sub-scores */}
          <div className="card" style={{marginBottom:14}}>
            <div style={{display:'flex',gap:22,alignItems:'center',flexWrap:'wrap'}}>
              <Ring score={analysis.score}/>
              <div style={{flex:1,minWidth:180}}>
                <div style={{fontWeight:700,fontSize:17,marginBottom:3}}>{analysis.scoreTitle}</div>
                <div className="muted" style={{fontSize:13,lineHeight:1.65,marginBottom:12}}>{analysis.scoreVerdict}</div>
                {(analysis.subScores||[]).map((b,i)=>(
                  <div className="bar-row" key={i}>
                    <span className="bar-lbl">{b.label}</span>
                    <div className="bar-track"><div className="bar-fill" style={{width:b.value+'%',background:sc(b.value)}}/></div>
                    <span className="bar-val" style={{color:sc(b.value)}}>{b.value}%</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* JD intelligence */}
          {jdMeta&&(
            <div className="card" style={{marginBottom:14}}>
              <div style={{fontFamily:'var(--mono)',fontSize:10,textTransform:'uppercase',letterSpacing:'.07em',color:'var(--muted)',marginBottom:10}}>📋 JD Intelligence</div>
              <div className="g2" style={{gap:10,marginBottom:10}}>
                <div><span className="muted" style={{fontSize:11}}>Domain: </span><span style={{fontSize:12,fontWeight:600}}>{jdMeta.domain||'—'}</span></div>
                <div><span className="muted" style={{fontSize:11}}>Seniority: </span><span style={{fontSize:12,fontWeight:600}}>{jdMeta.seniority||'—'}</span></div>
              </div>
              {jdMeta.must_have?.length>0&&<div style={{marginBottom:8}}>
                <div className="muted" style={{fontSize:11,marginBottom:5}}>Must-Have</div>
                <Tags items={jdMeta.must_have} cls="tag-r"/>
              </div>}
              {jdMeta.hidden_signals?.length>0&&<div>
                <div className="muted" style={{fontSize:11,marginBottom:5}}>Hidden Signals</div>
                <Tags items={jdMeta.hidden_signals} cls="tag-p"/>
              </div>}
            </div>
          )}

          {/* Keywords */}
          <div className="g2" style={{marginBottom:14}}>
            <div className="card">
              <div style={{fontFamily:'var(--mono)',fontSize:10,textTransform:'uppercase',letterSpacing:'.07em',color:'var(--muted)',marginBottom:8}}>✅ Matched ({(analysis.matchedKeywords||[]).length})</div>
              <Tags items={analysis.matchedKeywords} cls="tag-g" prefix="✓ "/>
            </div>
            <div className="card">
              <div style={{fontFamily:'var(--mono)',fontSize:10,textTransform:'uppercase',letterSpacing:'.07em',color:'var(--muted)',marginBottom:8}}>❌ Missing ({(analysis.missingKeywords||[]).length})</div>
              <Tags items={analysis.missingKeywords} cls="tag-r" prefix="✕ "/>
            </div>
          </div>

          {/* Strengths / Gaps */}
          <div className="g2" style={{marginBottom:14}}>
            <div className="card">
              <div style={{fontFamily:'var(--mono)',fontSize:10,textTransform:'uppercase',letterSpacing:'.07em',color:'var(--muted)',marginBottom:8}}>💪 Strengths</div>
              {(analysis.strengths||[]).map((s,i)=><div key={i} style={{display:'flex',gap:8,fontSize:13,marginBottom:5,lineHeight:1.5}}><span style={{color:'var(--green)',flexShrink:0}}>▸</span>{s}</div>)}
            </div>
            <div className="card">
              <div style={{fontFamily:'var(--mono)',fontSize:10,textTransform:'uppercase',letterSpacing:'.07em',color:'var(--muted)',marginBottom:8}}>⚠️ Gaps</div>
              {(analysis.gaps||[]).map((g,i)=><div key={i} style={{display:'flex',gap:8,fontSize:13,marginBottom:5,lineHeight:1.5}}><span style={{color:'var(--red)',flexShrink:0}}>✕</span>{g}</div>)}
            </div>
          </div>

          {/* Patches */}
          {patches&&patches.patches?.length>0&&(
            <div className="card" style={{marginBottom:14}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12,gap:10,flexWrap:'wrap'}}>
                <div style={{fontFamily:'var(--mono)',fontSize:10,textTransform:'uppercase',letterSpacing:'.07em',color:'var(--muted)'}}>✏️ Micro-Diff Suggestions ({patches.patches.length})</div>
                <button className="btn btn-outline btn-xs" onClick={()=>{
                  const txt=['=== Career OS — Edit Suggestions ===',`Company: ${extCompany}`,`Role: ${extRole}`,`Score: ${analysis.score}%`,`Strategy: ${patches.summary}`,'',
                    ...patches.patches.map((p,i)=>`#${i+1} [${p.section||'—'}] (${p.impact||'—'}) — ${p.reason||''}\nBEFORE: ${p.before||p.original||''}\nAFTER:  ${p.after||p.revised||''}`)
                  ].join('\n');
                  navigator.clipboard.writeText(txt).then(()=>toast('✅ Copied!'));
                }}>📋 Copy All</button>
              </div>
              {patches.summary&&<div className="alert alert-info" style={{marginBottom:12}}><span className="alert-icon">🧠</span>{patches.summary}</div>}
              {patches.patches.map((p,i)=><PatchCard key={i} p={p} idx={i}/>)}
            </div>
          )}

          {/* Strategy */}
          {strategy&&(
            <div className="card" style={{marginBottom:14}}>
              <div style={{fontFamily:'var(--mono)',fontSize:10,textTransform:'uppercase',letterSpacing:'.07em',color:'var(--muted)',marginBottom:12}}>🧭 Application Strategy</div>
              {strategy.positioning&&<div style={{marginBottom:10}}>
                <div className="muted" style={{fontSize:11,marginBottom:4}}>Positioning Angle</div>
                <div style={{fontSize:13,lineHeight:1.65,borderLeft:'2px solid var(--accent)',paddingLeft:10}}>{strategy.positioning}</div>
              </div>}
              <div className="g2" style={{gap:10}}>
                {strategy.email_pitch&&<div className="card-2">
                  <div className="muted" style={{fontSize:11,marginBottom:6}}>📧 Email Pitch (5 lines)</div>
                  <div style={{fontSize:12,lineHeight:1.7,whiteSpace:'pre-wrap'}}>{strategy.email_pitch}</div>
                </div>}
                {strategy.linkedin_summary&&<div className="card-2">
                  <div className="muted" style={{fontSize:11,marginBottom:6}}>🔗 LinkedIn Summary</div>
                  <div style={{fontSize:12,lineHeight:1.7}}>{strategy.linkedin_summary}</div>
                </div>}
              </div>
            </div>
          )}

          {/* Resume memory */}
          {resumeMem&&(
            <div className="card" style={{marginBottom:14}}>
              <div style={{fontFamily:'var(--mono)',fontSize:10,textTransform:'uppercase',letterSpacing:'.07em',color:'var(--muted)',marginBottom:10}}>🧬 Resume Map</div>
              <div className="g2" style={{gap:10,marginBottom:10}}>
                <div><div className="muted" style={{fontSize:11,marginBottom:4}}>Seniority</div><div style={{fontSize:13,fontWeight:600}}>{resumeMem.seniority_level||'—'}</div></div>
                <div><div className="muted" style={{fontSize:11,marginBottom:4}}>Domains</div><Tags items={resumeMem.domains} cls="tag-c"/></div>
              </div>
              {resumeMem.strength_clusters?.length>0&&<div>
                <div className="muted" style={{fontSize:11,marginBottom:5}}>Strength Clusters</div>
                <Tags items={resumeMem.strength_clusters} cls="tag-p"/>
              </div>}
            </div>
          )}

          {/* Recommendations */}
          {analysis.recommendations?.length>0&&(
            <div className="card">
              <div style={{fontFamily:'var(--mono)',fontSize:10,textTransform:'uppercase',letterSpacing:'.07em',color:'var(--muted)',marginBottom:10}}>🔧 Recommendations</div>
              <div className="g2">
                {analysis.recommendations.map((r,i)=>(
                  <div key={i} style={{display:'flex',gap:8,fontSize:13,lineHeight:1.55,background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,padding:'8px 12px'}}>
                    <span style={{color:'var(--accent)',flexShrink:0}}>→</span>{r}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// PAGE: BULK APPLY
// ──────────────────────────────────────────────────────────────
function BulkApplyPage(){
  const [resume,setResume]=useState('');
  const [jds,setJds]=useState([{id:1,text:'',url:'',company:'',role:''}]);
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);
  const [err,setErr]=useState('');

  const addJD=()=>setJds(j=>[...j,{id:Date.now(),text:'',url:'',company:'',role:''}]);
  const removeJD=id=>setJds(j=>j.filter(x=>x.id!==id));
  const updateJD=(id,k,v)=>setJds(j=>j.map(x=>x.id===id?{...x,[k]:v}:x));

  const run=async()=>{
    const validJDs=jds.filter(j=>j.text.trim());
    if(!resume.trim())return setErr('Add your resume.');
    if(validJDs.length<2)return setErr('Add at least 2 job descriptions.');
    setErr('');setLoading(true);
    try{
      const r=await fetch('/api/apply-mode',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({resume:resume.slice(0,6000),jds:validJDs.map(j=>({text:j.text.slice(0,3000),company:j.company,role:j.role}))})});
      const d=await r.json();
      if(!r.ok)throw new Error(d.error||'Failed');
      setResult(d);
    }catch(e){setErr(e.message);}
    finally{setLoading(false);}
  };

  return(
    <div>
      <div style={{marginBottom:20}}>
        <h1 style={{fontSize:20,fontWeight:700,marginBottom:4}}>🚀 Bulk Apply Mode</h1>
        <p className="muted" style={{fontSize:13}}>Upload multiple JDs — AI finds common patterns and generates a master strategy.</p>
      </div>
      {err&&<div className="alert alert-err"><span className="alert-icon">⚠️</span>{err}</div>}
      <div className="card" style={{marginBottom:14}}>
        <div style={{fontWeight:600,fontSize:13,marginBottom:8}}>📄 Your Resume</div>
        <textarea className="input" style={{minHeight:120,fontFamily:'var(--mono)',fontSize:12}} placeholder="Paste resume…" value={resume} onChange={e=>setResume(e.target.value)}/>
      </div>
      <div style={{fontWeight:600,fontSize:13,marginBottom:10}}>📋 Job Descriptions ({jds.length})</div>
      {jds.map((j,i)=>(
        <div className="card" style={{marginBottom:10}} key={j.id}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
            <span style={{fontFamily:'var(--mono)',fontWeight:700,fontSize:12,color:'var(--muted)'}}>JD #{i+1}</span>
            <input className="input" style={{maxWidth:160,padding:'5px 9px',fontSize:12}} placeholder="Company" value={j.company} onChange={e=>updateJD(j.id,'company',e.target.value)}/>
            <input className="input" style={{flex:1,padding:'5px 9px',fontSize:12}} placeholder="Role" value={j.role} onChange={e=>updateJD(j.id,'role',e.target.value)}/>
            {jds.length>2&&<button className="btn-icon btn-danger" onClick={()=>removeJD(j.id)}>✕</button>}
          </div>
          <textarea className="input" style={{minHeight:90,fontSize:12}} placeholder="Paste JD text…" value={j.text} onChange={e=>updateJD(j.id,'text',e.target.value)}/>
        </div>
      ))}
      <div style={{display:'flex',gap:10,marginBottom:20}}>
        <button className="btn btn-outline btn-sm" onClick={addJD}>+ Add JD</button>
      </div>
      <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:'12px',fontSize:14}} onClick={run} disabled={loading}>
        {loading?<><span className="spinner"/>Analysing {jds.length} JDs…</>:'⚡ Run Bulk Analysis'}
      </button>

      {result&&(
        <div style={{marginTop:20}}>
          <div className="card" style={{marginBottom:14}}>
            <div style={{fontFamily:'var(--mono)',fontSize:10,textTransform:'uppercase',letterSpacing:'.07em',color:'var(--muted)',marginBottom:10}}>🎯 Role Cluster</div>
            <div style={{fontSize:16,fontWeight:700,marginBottom:6}}>{result.role_cluster||'—'}</div>
            <div style={{fontSize:13,lineHeight:1.65,color:'var(--text2)'}}>{result.master_resume_strategy}</div>
          </div>
          <div className="card" style={{marginBottom:14}}>
            <div style={{fontFamily:'var(--mono)',fontSize:10,textTransform:'uppercase',letterSpacing:'.07em',color:'var(--muted)',marginBottom:10}}>🔑 Common Keywords (ranked)</div>
            <Tags items={result.common_keywords} cls="tag-p"/>
          </div>
          {result.per_jd&&(
            <div>
              {result.per_jd.map((j,i)=>(
                <div className="card" style={{marginBottom:10}} key={i}>
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8,flexWrap:'wrap'}}>
                    <div style={{width:36,height:36,borderRadius:8,background:scBg(j.score||0),border:`1.5px solid ${scBd(j.score||0)}`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      <span style={{fontFamily:'var(--mono)',fontWeight:700,fontSize:13,color:sc(j.score||0)}}>{j.score||0}</span>
                    </div>
                    <div><div style={{fontWeight:600,fontSize:13}}>{j.company||`JD #${i+1}`}</div><div className="muted" style={{fontSize:11}}>{j.role}</div></div>
                    <span className={`chip ${j.decision==='YES'?'chip-offer':j.decision==='NO'?'chip-rejected':'chip-applied'}`} style={{marginLeft:'auto'}}>{j.decision==='YES'?'✅ Apply':j.decision==='NO'?'Skip':'Maybe'}</span>
                  </div>
                  {j.top_gaps?.length>0&&<div><div className="muted" style={{fontSize:11,marginBottom:4}}>Top gaps:</div><Tags items={j.top_gaps} cls="tag-r"/></div>}
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// PAGE: TRACKER
// ──────────────────────────────────────────────────────────────
function TrackerPage({cfg}){
  const [items,setItems]=useState([]);
  const [notes,setNotes]=useState({});
  const [loading,setLoading]=useState(true);
  const [filter,setFilter]=useState('all');
  const [search,setSearch]=useState('');
  const [open,setOpen]=useState({});
  const [showAdd,setShowAdd]=useState(false);
  const [editItem,setEditItem]=useState(null);
  const [noteInputs,setNoteInputs]=useState({});

  const load=useCallback(async()=>{
    if(!cfg.url)return;
    setLoading(true);
    try{
      const [r1,r2]=await Promise.all([
        fetch(cfg.url+'/rest/v1/tracked_resumes?select=*&order=created_at.desc&limit=100',{headers:{apikey:cfg.key,'Authorization':'Bearer '+cfg.key}}),
        fetch(cfg.url+'/rest/v1/resume_notes?select=*&order=created_at.asc',{headers:{apikey:cfg.key,'Authorization':'Bearer '+cfg.key}})
      ]);
      const rs=await r1.json(),ns=await r2.json();
      setItems(Array.isArray(rs)?rs:[]);
      const nc={};(Array.isArray(ns)?ns:[]).forEach(n=>{if(!nc[n.resume_id])nc[n.resume_id]=[];nc[n.resume_id].push(n);});
      setNotes(nc);
    }catch(e){toast(e.message,'fail');}
    finally{setLoading(false);}
  },[cfg.url,cfg.key]);

  useEffect(()=>{load();},[load]);

  const stats={
    total:items.length,
    avg:items.length?Math.round(items.reduce((a,r)=>a+(r.score||0),0)/items.length):0,
    applied:items.filter(r=>r.status==='applied').length,
    interview:items.filter(r=>r.status==='interview').length,
    offer:items.filter(r=>r.status==='offer').length,
  };

  const filtered=items.filter(r=>{
    const q=search.toLowerCase();
    return(filter==='all'||r.status===filter)&&(!q||(r.name||'').toLowerCase().includes(q)||(r.company||'').toLowerCase().includes(q)||(r.role||'').toLowerCase().includes(q));
  });

  const updateStatus=async(id,status)=>{
    try{
      await fetch(cfg.url+'/rest/v1/tracked_resumes?id=eq.'+id,{method:'PATCH',
        headers:{apikey:cfg.key,'Authorization':'Bearer '+cfg.key,'Content-Type':'application/json'},body:JSON.stringify({status})});
      setItems(rs=>rs.map(r=>r.id===id?{...r,status}:r));toast('Status updated');
    }catch(e){toast(e.message,'fail');}
  };

  const del=async(id)=>{
    if(!confirm('Delete?'))return;
    try{
      await fetch(cfg.url+'/rest/v1/resume_notes?resume_id=eq.'+id,{method:'DELETE',headers:{apikey:cfg.key,'Authorization':'Bearer '+cfg.key}});
      await fetch(cfg.url+'/rest/v1/tracked_resumes?id=eq.'+id,{method:'DELETE',headers:{apikey:cfg.key,'Authorization':'Bearer '+cfg.key}});
      setItems(rs=>rs.filter(r=>r.id!==id));toast('Deleted');
    }catch(e){toast(e.message,'fail');}
  };

  const addNote=async(rid)=>{
    const txt=(noteInputs[rid]||'').trim();if(!txt)return;
    try{
      const res=await fetch(cfg.url+'/rest/v1/resume_notes',{method:'POST',
        headers:{apikey:cfg.key,'Authorization':'Bearer '+cfg.key,'Content-Type':'application/json','Prefer':'return=representation'},
        body:JSON.stringify({resume_id:rid,text:txt})});
      const rows=await res.json();
      setNotes(n=>({...n,[rid]:[...(n[rid]||[]),rows[0]]}));
      setNoteInputs(ni=>({...ni,[rid]:''}));toast('Note added');
    }catch(e){toast(e.message,'fail');}
  };

  return(
    <div>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:10,marginBottom:20,flexWrap:'wrap'}}>
        <div><h1 style={{fontSize:20,fontWeight:700,marginBottom:4}}>💼 Resume Tracker</h1><p className="muted" style={{fontSize:13}}>Track every version — score, keywords, status, notes.</p></div>
        <button className="btn btn-primary btn-sm" onClick={()=>{setEditItem(null);setShowAdd(true);}}>+ Add Resume</button>
      </div>

      <div className="g4" style={{marginBottom:20}}>
        <div className="stat-card"><div className="stat-val">{stats.total}</div><div className="stat-lbl">Tracked</div></div>
        <div className="stat-card"><div className="stat-val" style={{color:'var(--accent)'}}>{stats.avg}%</div><div className="stat-lbl">Avg Score</div></div>
        <div className="stat-card"><div className="stat-val" style={{color:'var(--yellow)'}}>{stats.applied}</div><div className="stat-lbl">Applied</div></div>
        <div className="stat-card"><div className="stat-val" style={{color:'var(--accent2)'}}>{stats.interview}</div><div className="stat-lbl">Interviews</div><div className="stat-sub">{stats.offer} offer{stats.offer!==1?'s':''}</div></div>
      </div>

      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
        <input className="input" style={{maxWidth:200,padding:'6px 12px'}} placeholder="Search…" value={search} onChange={e=>setSearch(e.target.value)}/>
        <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
          {['all','draft','ready','applied','interview','offer','rejected'].map(f=>(
            <button key={f} className={`btn btn-xs${filter===f?' btn-primary':' btn-outline'}`} style={filter===f?{}:{color:'var(--muted)'}} onClick={()=>setFilter(f)}>
              {f.charAt(0).toUpperCase()+f.slice(1)}
            </button>
          ))}
        </div>
        <button className="btn btn-ghost btn-sm" style={{marginLeft:'auto'}} onClick={load}>↺</button>
      </div>

      {loading&&<div className="muted pulse" style={{textAlign:'center',padding:40,fontSize:13}}>Loading…</div>}
      {!loading&&filtered.length===0&&(
        <div style={{textAlign:'center',padding:'56px 20px'}}>
          <div style={{fontSize:36,marginBottom:10}}>📂</div>
          <div style={{fontWeight:600,marginBottom:5}}>No resumes found</div>
          <div className="muted" style={{fontSize:13}}>Run the Analyzer and save results, or click + Add Resume.</div>
        </div>
      )}

      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {filtered.map(r=>{
          const isOpen=!!open[r.id];const rNotes=notes[r.id]||[];
          return(
            <div className="card" style={{padding:0,overflow:'hidden',transition:'border-color .15s',cursor:'pointer'}} key={r.id}
              onMouseEnter={e=>e.currentTarget.style.borderColor='var(--accent)'}
              onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}>
              <div style={{display:'grid',gridTemplateColumns:'52px 1fr auto',gap:14,alignItems:'center',padding:'14px 18px'}} onClick={()=>setOpen(o=>({...o,[r.id]:!o[r.id]}))}>
                <div style={{width:48,height:48,borderRadius:10,background:scBg(r.score),border:`2px solid ${scBd(r.score)}`,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <span style={{fontFamily:'var(--mono)',fontWeight:700,fontSize:15,color:sc(r.score),lineHeight:1}}>{r.score||0}</span>
                  <span style={{fontFamily:'var(--mono)',fontSize:8,opacity:.6,marginTop:1}}>MATCH</span>
                </div>
                <div>
                  <div style={{fontWeight:600,fontSize:14,marginBottom:2}}>{r.name||'Untitled'}</div>
                  <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--accent)',marginBottom:4}}>{r.company||'—'}{r.role?` · ${r.role}`:''}</div>
                  <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
                    <span className="muted" style={{fontSize:11}}>{fmtDate(r.created_at)}</span>
                    <span style={{background:'var(--surface2)',padding:'1px 7px',borderRadius:4,fontFamily:'var(--mono)',fontSize:10,border:'1px solid var(--border)'}}>{relDate(r.created_at)}</span>
                    <StatusChip s={r.status}/>
                  </div>
                </div>
                <div style={{display:'flex',gap:6,flexShrink:0}} onClick={e=>e.stopPropagation()}>
                  {r.job_url&&<a href={r.job_url} target="_blank" className="btn btn-xs btn-outline">↗</a>}
                  <button className="btn btn-xs btn-outline" onClick={()=>{setEditItem(r);setShowAdd(true);}}>✏️</button>
                  <button className="btn btn-xs btn-danger" onClick={()=>del(r.id)}>🗑</button>
                </div>
              </div>
              {isOpen&&(
                <div style={{borderTop:'1px solid var(--border)',padding:'16px 18px'}}>
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14,flexWrap:'wrap'}}>
                    <span className="muted" style={{fontFamily:'var(--mono)',fontSize:11}}>Status:</span>
                    <select className="input" style={{width:'auto',padding:'4px 8px',fontSize:12}} value={r.status||'draft'} onChange={e=>updateStatus(r.id,e.target.value)}>
                      {Object.entries(SM).map(([v,l])=><option key={v} value={v}>{l}</option>)}
                    </select>
                  </div>
                  <div className="g2" style={{marginBottom:12}}>
                    <div className="card-2"><div className="muted" style={{fontSize:11,marginBottom:6}}>✅ Matched</div><Tags items={r.matched_keywords} cls="tag-g" prefix="✓ "/></div>
                    <div className="card-2"><div className="muted" style={{fontSize:11,marginBottom:6}}>❌ Missing</div><Tags items={r.missing_keywords} cls="tag-r" prefix="✕ "/></div>
                  </div>
                  {r.suggestions&&(
                    <div className="card-2" style={{marginBottom:12}}>
                      <div className="muted" style={{fontSize:11,marginBottom:6}}>✏️ Edit Suggestions</div>
                      {r.suggestions.split('\n').filter(l=>l.trim()).map((l,i)=>(
                        <div key={i} style={{fontSize:12,lineHeight:1.6,borderLeft:'2px solid var(--border)',paddingLeft:10,marginBottom:4}}>{l}</div>
                      ))}
                    </div>
                  )}
                  {r.resume_content&&(
                    <div className="card-2" style={{marginBottom:12}}>
                      <div className="muted" style={{fontSize:11,marginBottom:6}}>📄 Resume</div>
                      <pre style={{fontFamily:'var(--mono)',fontSize:11,lineHeight:1.7,whiteSpace:'pre-wrap',maxHeight:200,overflowY:'auto'}}>{r.resume_content}</pre>
                    </div>
                  )}
                  <div className="card-2">
                    <div className="muted" style={{fontSize:11,marginBottom:8}}>📝 Notes</div>
                    {rNotes.map(n=>(
                      <div key={n.id} style={{display:'flex',gap:10,alignItems:'flex-start',padding:'6px 8px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:6,marginBottom:6,fontSize:13}}>
                        <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--muted)',flexShrink:0,marginTop:2}}>{fmtDate(n.created_at)}</span>
                        <span style={{flex:1}}>{n.text}</span>
                      </div>
                    ))}
                    <div style={{display:'flex',gap:8,marginTop:8}}>
                      <input className="input" style={{fontSize:12}} placeholder="Add note…" value={noteInputs[r.id]||''}
                        onChange={e=>setNoteInputs(ni=>({...ni,[r.id]:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&addNote(r.id)}/>
                      <button className="btn btn-outline btn-sm" onClick={()=>addNote(r.id)}>+ Add</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
      {showAdd&&<TrackerModal cfg={cfg} item={editItem} onClose={()=>{setShowAdd(false);setEditItem(null);}} onSaved={()=>{load();setShowAdd(false);setEditItem(null);}}/>}
    </div>
  );
}

function TrackerModal({cfg,item,onClose,onSaved}){
  const [f,setF]=useState({name:item?.name||'',company:item?.company||'',role:item?.role||'',
    job_url:item?.job_url||'',score:item?.score||'',status:item?.status||'draft',
    suggestions:item?.suggestions||'',resume_content:item?.resume_content||'',jd_snippet:item?.jd_snippet||''});
  const [saving,setSaving]=useState(false);
  const upd=(k,v)=>setF(p=>({...p,[k]:v}));
  const save=async()=>{
    if(!f.name.trim()){toast('Enter a name.','fail');return;}
    setSaving(true);
    try{
      const score=parseInt(f.score)||0;
      const payload={...f,score,score_title:score>=75?'Strong Match':score>=50?'Moderate Fit':'Weak Match',
        job_url:f.job_url||null,suggestions:f.suggestions||null,resume_content:f.resume_content||null,jd_snippet:f.jd_snippet||null};
      if(!item)payload.created_at=new Date().toISOString();
      const url=cfg.url+'/rest/v1/tracked_resumes'+(item?'?id=eq.'+item.id:'');
      const res=await fetch(url,{method:item?'PATCH':'POST',
        headers:{apikey:cfg.key,'Authorization':'Bearer '+cfg.key,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(payload)});
      if(!res.ok)throw new Error('Supabase '+res.status);
      toast(item?'✅ Updated!':'✅ Saved!');onSaved();
    }catch(e){toast(e.message,'fail');}
    finally{setSaving(false);}
  };
  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-title">{item?'Edit Resume':'Add to Tracker'}</div>
        <div className="g2" style={{marginBottom:12}}>
          <div className="field"><label>Name *</label><input className="input" value={f.name} onChange={e=>upd('name',e.target.value)} placeholder="Resume v3 — Mech Design"/></div>
          <div className="field"><label>Company</label><input className="input" value={f.company} onChange={e=>upd('company',e.target.value)}/></div>
          <div className="field"><label>Role</label><input className="input" value={f.role} onChange={e=>upd('role',e.target.value)}/></div>
          <div className="field"><label>Job URL</label><input className="input" value={f.job_url} onChange={e=>upd('job_url',e.target.value)}/></div>
          <div className="field"><label>Score (%)</label><input className="input" type="number" min="0" max="100" value={f.score} onChange={e=>upd('score',e.target.value)}/></div>
          <div className="field"><label>Status</label><select className="input" value={f.status} onChange={e=>upd('status',e.target.value)}>{Object.entries(SM).map(([v,l])=><option key={v} value={v}>{l}</option>)}</select></div>
        </div>
        <div className="field" style={{marginBottom:12}}><label>Suggestions</label><textarea className="input" rows={3} value={f.suggestions} onChange={e=>upd('suggestions',e.target.value)}/></div>
        <div className="field" style={{marginBottom:12}}><label>Resume Content</label><textarea className="input" rows={4} value={f.resume_content} onChange={e=>upd('resume_content',e.target.value)} style={{fontFamily:'var(--mono)',fontSize:12}}/></div>
        <div className="field" style={{marginBottom:16}}><label>JD Snippet</label><textarea className="input" rows={2} value={f.jd_snippet} onChange={e=>upd('jd_snippet',e.target.value)}/></div>
        <div style={{display:'flex',gap:10}}>
          <button className="btn btn-primary" onClick={save} disabled={saving}>{saving?<><span className="spinner"/>Saving…</>:'💾 Save'}</button>
          <button className="btn btn-outline" onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}
