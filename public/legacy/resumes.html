<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Resume Tracker â€” RxJD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f0f2f7;--surface:#ffffff;--surface2:#f5f7fb;--border:#dde2ef;
    --accent:#3b7ef5;--accent2:#6c3ff7;--green:#15a06e;--red:#d94f4f;--yellow:#c78b00;
    --text:#1a2035;--muted:#7080a0;--shadow:0 2px 12px rgba(0,0,0,.08);
    --grid-color:rgba(0,0,0,.055);
    --gs:'Google Sans',sans-serif;--mono:'DM Mono',monospace;
  }
  [data-theme="dark"] {
    --bg:#090d18;--surface:#0f1523;--surface2:#141a2e;--border:#1c2540;
    --accent:#4f8ef7;--accent2:#7c5cfc;--green:#2dd4a0;--red:#f76f6f;--yellow:#f7c84f;
    --text:#e2e8f8;--muted:#5a6a8a;--shadow:0 2px 12px rgba(0,0,0,.45);
    --grid-color:rgba(255,255,255,.038);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--gs);min-height:100vh;font-size:14px;transition:background .2s,color .2s;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--grid-color) 1px,transparent 1px),linear-gradient(90deg,var(--grid-color) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0;}
  .wrap{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:0 24px 80px;}

  /* HEADER */
  header{display:flex;align-items:center;justify-content:space-between;padding:24px 0 16px;border-bottom:1px solid var(--border);margin-bottom:28px;}
  .logo{font-family:var(--gs);font-weight:700;font-size:20px;letter-spacing:-.3px;}.logo em{color:var(--accent);font-style:normal;}
  .hdr-right{display:flex;align-items:center;gap:10px;}
  .hdr-link{font-family:var(--mono);font-size:11px;padding:5px 11px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);text-decoration:none;transition:all .2s;}
  .hdr-link:hover{border-color:var(--accent);color:var(--accent);}
  .theme-btn{font-family:var(--mono);font-size:11px;padding:5px 11px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;transition:all .2s;}
  .theme-btn:hover{border-color:var(--accent);color:var(--accent);}

  /* STATS */
  .page-hdr{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;}
  .page-title{font-size:24px;font-weight:700;}
  .page-sub{color:var(--muted);font-size:13px;margin-top:4px;}
  .stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 18px;box-shadow:var(--shadow);}
  .stat-val{font-size:26px;font-weight:700;line-height:1;}
  .stat-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.07em;color:var(--muted);margin-top:4px;text-transform:uppercase;}

  /* FILTERS */
  .filters{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
  .filter-btn{font-family:var(--mono);font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;transition:all .2s;}
  .filter-btn.active{border-color:var(--accent);background:rgba(59,126,245,.08);color:var(--accent);}
  .search-input{flex:1;min-width:180px;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--gs);font-size:13px;padding:6px 12px;outline:none;transition:border-color .2s;}
  .search-input:focus{border-color:var(--accent);}
  .search-input::placeholder{color:var(--muted);}

  /* ADD RESUME MODAL */
  .add-btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:8px;border:none;background:linear-gradient(130deg,var(--accent),var(--accent2));color:#fff;font-family:var(--gs);font-weight:600;font-size:13px;cursor:pointer;transition:all .2s;}
  .add-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(59,126,245,.28);}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.25);}
  .modal-title{font-size:17px;font-weight:700;margin-bottom:18px;}
  .field-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  .field{display:flex;flex-direction:column;gap:5px;}
  .field label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);}
  .field input,.field select,.field textarea{background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--gs);font-size:13px;padding:8px 11px;outline:none;transition:border-color .2s;width:100%;}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
  .field textarea{resize:vertical;font-family:var(--mono);font-size:12px;}
  .modal-btns{display:flex;gap:10px;margin-top:16px;}
  .modal-save{padding:9px 20px;border-radius:8px;border:none;background:linear-gradient(130deg,var(--accent),var(--accent2));color:#fff;font-family:var(--gs);font-weight:600;font-size:13px;cursor:pointer;}
  .modal-cancel{padding:9px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-family:var(--gs);font-size:13px;cursor:pointer;}
  .modal-cancel:hover{border-color:var(--red);color:var(--red);}
  .modal-status{font-family:var(--mono);font-size:11px;color:var(--muted);align-self:center;}

  /* RESUME CARDS */
  .cards-grid{display:flex;flex-direction:column;gap:14px;}
  .res-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .2s;box-shadow:var(--shadow);}
  .res-card:hover{border-color:var(--accent);}
  .res-card-top{display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;padding:16px 20px;cursor:pointer;user-select:none;}
  .score-ring{width:54px;height:54px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
  .score-ring-num{font-family:var(--mono);font-weight:700;font-size:18px;line-height:1;}
  .score-ring-lbl{font-family:var(--mono);font-size:8px;letter-spacing:.05em;opacity:.6;margin-top:1px;}
  .res-meta h3{font-size:15px;font-weight:600;margin-bottom:2px;}
  .res-company{font-family:var(--mono);font-size:11px;color:var(--accent);margin-bottom:4px;}
  .res-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);flex-wrap:wrap;}
  .res-actions{display:flex;gap:8px;align-items:center;flex-shrink:0;}
  .icon-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--gs);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;text-decoration:none;white-space:nowrap;}
  .icon-btn:hover{border-color:var(--accent);color:var(--accent);}
  .icon-btn.danger{border-color:rgba(217,79,79,.3);color:var(--red);}
  .icon-btn.danger:hover{background:rgba(217,79,79,.08);}

  /* STATUS CHIPS */
  .status-chip{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:4px;font-weight:500;white-space:nowrap;}
  .s-draft{background:rgba(112,128,160,.12);color:var(--muted);border:1px solid rgba(112,128,160,.25);}
  .s-ready{background:rgba(59,126,245,.12);color:var(--accent);border:1px solid rgba(59,126,245,.25);}
  .s-applied{background:rgba(199,139,0,.12);color:var(--yellow);border:1px solid rgba(199,139,0,.25);}
  .s-interview{background:rgba(108,63,247,.12);color:var(--accent2);border:1px solid rgba(108,63,247,.25);}
  .s-offer{background:rgba(21,160,110,.12);color:var(--green);border:1px solid rgba(21,160,110,.25);}
  .s-rejected{background:rgba(217,79,79,.12);color:var(--red);border:1px solid rgba(217,79,79,.25);}
  [data-theme="dark"] .s-applied{background:rgba(247,200,79,.12);border-color:rgba(247,200,79,.25);}
  [data-theme="dark"] .s-offer{background:rgba(45,212,160,.12);border-color:rgba(45,212,160,.25);}

  /* EXPAND */
  .res-expand{display:none;border-top:1px solid var(--border);padding:18px 20px;}
  .res-expand.open{display:block;animation:fadeUp .2s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:translateY(0);}}
  .expand-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
  .expand-sect{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:12px 14px;}
  .expand-ttl{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:8px;}
  .tags{display:flex;flex-wrap:wrap;gap:5px;}
  .tag{font-family:var(--mono);font-size:11px;padding:3px 8px;border-radius:5px;}
  .tag-g{background:rgba(21,160,110,.1);border:1px solid rgba(21,160,110,.2);color:var(--green);}
  .tag-r{background:rgba(217,79,79,.1);border:1px solid rgba(217,79,79,.2);color:var(--red);}
  [data-theme="dark"] .tag-g{background:rgba(45,212,160,.1);border-color:rgba(45,212,160,.22);}
  [data-theme="dark"] .tag-r{background:rgba(247,111,111,.1);border-color:rgba(247,111,111,.22);}
  .suggestions-block{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:14px 16px;margin-bottom:12px;}
  .suggestion-item{border-left:2px solid var(--accent);padding:6px 12px;margin-bottom:8px;border-radius:0 6px 6px 0;background:rgba(59,126,245,.04);}
  .suggestion-item:last-child{margin-bottom:0;}
  .resume-content-block{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:12px 14px;}
  .resume-pre{font-family:var(--mono);font-size:11px;line-height:1.7;white-space:pre-wrap;color:var(--text);max-height:320px;overflow-y:auto;}

  /* STATUS UPDATE */
  .status-select{font-family:var(--mono);font-size:11px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:4px 8px;cursor:pointer;outline:none;}
  .status-select:focus{border-color:var(--accent);}

  /* NOTES */
  .note-row{display:flex;gap:8px;margin-top:8px;}
  .note-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--gs);font-size:13px;padding:7px 11px;outline:none;transition:border-color .2s;}
  .note-input:focus{border-color:var(--accent);}
  .note-input::placeholder{color:var(--muted);}
  .note-add{padding:7px 13px;border-radius:7px;border:1px solid rgba(59,126,245,.3);background:rgba(59,126,245,.08);color:var(--accent);font-family:var(--gs);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;}
  .note-add:hover{background:rgba(59,126,245,.18);}
  .note-item{display:flex;gap:10px;align-items:flex-start;padding:7px 10px;background:var(--surface);border:1px solid var(--border);border-radius:7px;margin-bottom:6px;font-size:13px;}
  .note-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;flex-shrink:0;}
  .note-del:hover{color:var(--red);}
  .note-date{font-family:var(--mono);font-size:10px;color:var(--muted);white-space:nowrap;flex-shrink:0;margin-top:2px;}

  .loading-msg{padding:40px;text-align:center;color:var(--muted);}
  .empty-state{padding:60px 40px;text-align:center;}
  .empty-icon{font-size:48px;margin-bottom:14px;}
  .empty-title{font-size:18px;font-weight:600;margin-bottom:6px;}
  .empty-sub{color:var(--muted);font-size:13px;}
  .toast{position:fixed;bottom:24px;right:24px;padding:11px 16px;border-radius:9px;font-size:13px;font-weight:500;z-index:999;opacity:0;transform:translateY(6px);transition:all .3s;pointer-events:none;}
  .toast.show{opacity:1;transform:translateY(0);}
  .toast.ok{background:var(--surface);border:1px solid var(--green);color:var(--green);box-shadow:var(--shadow);}
  .toast.fail{background:var(--surface);border:1px solid var(--red);color:var(--red);box-shadow:var(--shadow);}
  @media(max-width:720px){.stats-row{grid-template-columns:repeat(3,1fr);}.field-grid{grid-template-columns:1fr;}.expand-grid{grid-template-columns:1fr;}.res-card-top{grid-template-columns:auto 1fr;}.res-actions{display:none;}}
</style>
<script>

    var t=localStorage.getItem('rxjd-theme')||'light';

    function upBtn(){var b=document.getElementById('themeBtn');if(b)b.textContent=document.documentElement.getAttribute('data-theme')==='dark'?'â˜€ï¸ Light':'ðŸŒ™ Dark';}
    window.toggleTheme=function(){var c=document.documentElement.getAttribute('data-theme'),n=c==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('rxjd-theme',n);upBtn();};
    document.addEventListener('DOMContentLoaded',upBtn);
  })();
</script>

<body>

  <header>
    <div class="logo">Resume<em>Ã—</em>JD <span style="color:var(--muted);font-weight:400">/ Tracker</span></div>
    <div class="hdr-right">

<script>
var SB, SK, AUTH_CLIENT, AUTH_TOKEN, allResumes=[], notesCache={}, activeFilter='all';
var activeScoreFilter='all', activeAppliedFilter='any';

function toast(m,ok){var t=document.getElementById('toast');t.textContent=m;t.className='toast show '+(ok===false?'fail':'ok');setTimeout(function(){t.className='toast';},3000);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDt(iso){if(!iso)return'â€”';return new Date(iso).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
function relDt(iso){if(!iso)return'';var d=Math.floor((Date.now()-new Date(iso))/86400000);if(d===0)return'Today';if(d===1)return'Yesterday';if(d<7)return d+'d ago';if(d<30)return Math.floor(d/7)+'w ago';return Math.floor(d/30)+'mo ago';}
function sc(s){return s>=75?'var(--green)':s>=50?'var(--yellow)':'var(--red)';}
function scBg(s){return s>=75?'rgba(21,160,110,.15)':s>=50?'rgba(199,139,0,.15)':'rgba(217,79,79,.15)';}
function scBd(s){return s>=75?'rgba(21,160,110,.4)':s>=50?'rgba(199,139,0,.4)':'rgba(217,79,79,.4)';}
function statusChip(s){
  var map={draft:'s-draft Draft',ready:'s-ready Ready',applied:'s-applied Applied',interview:'s-interview Interview',offer:'s-offer Offer ðŸŽ‰',rejected:'s-rejected Rejected'};
  var v=(map[s]||'s-draft Draft').split(' ');
  return '<span class="status-chip '+v[0]+'">'+v.slice(1).join(' ')+'</span>';
}
function statusOptions(cur){
  var opts=['draft:Draft','ready:Ready to Apply','applied:Applied','interview:Interview','offer:Offer','rejected:Rejected'];
  return opts.map(function(o){var p=o.split(':');return '<option value="'+p[0]+'"'+(cur===p[0]?' selected':'')+'>'+p[1]+'</option>';}).join('');
}
function scoreMatch(score,filter){
  var s=parseInt(score)||0;
  if(filter==='75plus')return s>=75;
  if(filter==='50to74')return s>=50&&s<75;
  if(filter==='below50')return s<50;
  return true;
}
function appliedDateMatch(lastAppliedAt,filter){
  if(filter==='any')return true;
  if(!lastAppliedAt)return false;
  var diffDays=Math.floor((Date.now()-new Date(lastAppliedAt))/86400000);
  if(filter==='7d')return diffDays<=7;
  if(filter==='30d')return diffDays<=30;
  if(filter==='90d')return diffDays<=90;
  return true;
}
function toIsoFromDateInput(v){
  return v?new Date(v+'T00:00:00').toISOString():null;
}
function toDateInputFromIso(iso){
  if(!iso)return '';
  return new Date(iso).toISOString().slice(0,10);
}

  var misH=missing.length?missing.slice(0,8).map(function(k){return '<span class="tag tag-r">âœ• '+esc(k)+'</span>';}).join(''):'<span style="color:var(--muted);font-size:12px">â€”</span>';
  var notesH=notes.length?notes.map(function(n){
    return '<div class="note-item"><div class="note-date">'+fmtDt(n.created_at)+'</div><div style="flex:1">'+esc(n.text)+'</div><button class="note-del" data-nid="'+n.id+'" data-rid="'+r.id+'">âœ•</button></div>';

  var suggestH='';
  if(r.suggestions){

    suggestH='<div class="suggestions-block"><div class="expand-ttl">âœï¸ Edit Suggestions</div>'
      +lines.map(function(l){return '<div class="suggestion-item" style="font-size:12px;color:var(--text);line-height:1.55">'+esc(l)+'</div>';}).join('')+'</div>';
  }
  var resumeH=r.resume_content

    +'<div class="res-meta">'
    +'<h3>'+esc(r.name||'Untitled Resume')+'</h3>'
    +'<div class="res-company">'+esc(r.company||'â€”')+(r.role?' Â· '+esc(r.role):'')+'</div>'
    +'<div class="res-row"><span>'+fmtDt(r.created_at)+'</span><span style="background:var(--surface2);padding:1px 7px;border-radius:4px;font-family:var(--mono);font-size:10px;border:1px solid var(--border)">'+relDt(r.created_at)+'</span>'+statusChip(r.status)+'</div>'
    +(r.last_applied_at?'<div class="res-row" style="margin-top:3px"><span>Last applied:</span><span style="font-family:var(--mono);font-size:11px">'+fmtDt(r.last_applied_at)+'</span></div>':'')

function renderStats(resumes){
  document.getElementById('st-total').textContent=resumes.length;
  var avg=resumes.length?Math.round(resumes.reduce(function(a,r){return a+(r.score||0);},0)/resumes.length):0;
  document.getElementById('st-avg').textContent=avg+'%';
  document.getElementById('st-applied').textContent=resumes.filter(function(r){return r.status==='applied';}).length;
  document.getElementById('st-interview').textContent=resumes.filter(function(r){return r.status==='interview';}).length;
  document.getElementById('st-offer').textContent=resumes.filter(function(r){return r.status==='offer';}).length;
}

function setFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  applyFilters();
}

function applyFilters(){
  var q=(document.getElementById('searchInput').value||'').toLowerCase();
  activeScoreFilter=(document.getElementById('scoreFilter')||{}).value||'all';
  activeAppliedFilter=(document.getElementById('appliedFilter')||{}).value||'any';
  var filtered=allResumes.filter(function(r){
    var matchFilter=activeFilter==='all'||r.status===activeFilter;
    var matchSearch=!q||(r.name||'').toLowerCase().includes(q)||(r.company||'').toLowerCase().includes(q)||(r.role||'').toLowerCase().includes(q);
    var matchScore=scoreMatch(r.score,activeScoreFilter);
    var matchApplied=appliedDateMatch(r.last_applied_at,activeAppliedFilter);
    return matchFilter&&matchSearch&&matchScore&&matchApplied;
  });
  renderCards(filtered);
}

function renderCards(list){
  var c=document.getElementById('cardsContainer');
  if(!list.length){
    c.innerHTML='<div class="empty-state"><div class="empty-icon">ðŸ“‚</div><div class="empty-title">No resumes found</div><div class="empty-sub">Add a resume from the Analyzer page or click "+ Add Resume" above.</div></div>';
    return;
  }
  c.innerHTML='<div class="cards-grid">'+list.map(buildCard).join('')+'</div>';
}

// Event delegation
document.addEventListener('click',function(e){
  var tog=e.target.closest('[data-toggle]');
  if(tog&&!e.target.closest('.res-actions')&&!e.target.closest('.status-select')&&!e.target.closest('.note-add')&&!e.target.closest('a')){
    var id=tog.dataset.toggle;
    var el=document.getElementById('re-'+id);
    if(el)el.classList.toggle('open');
    return;
  }
  var del=e.target.closest('[data-del]');
  if(del){e.stopPropagation();deleteResume(del.dataset.del);return;}
  var addNote=e.target.closest('[data-add-note]');
  if(addNote){addNoteToResume(addNote.dataset.addNote);return;}
  var delNote=e.target.closest('[data-nid]');
  if(delNote&&delNote.classList.contains('note-del')){deleteNote(delNote.dataset.nid,delNote.dataset.rid);return;}
  var editBtn=e.target.closest('[data-edit]');
  if(editBtn){openEditModal(editBtn.dataset.edit);return;}
});

document.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&e.target.classList.contains('note-input')){
    var rid=e.target.id.replace('ni-','');addNoteToResume(rid);
  }
});

document.addEventListener('change',function(e){

async function updateStatus(rid,newStatus){
  try{
    var payload={status:newStatus};
    if(newStatus==='applied')payload.last_applied_at=new Date().toISOString();
    var res=await fetch(SB+'/rest/v1/tracked_resumes?id=eq.'+rid,{
      method:'PATCH',
      headers:{apikey:SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    if(!res.ok)throw new Error('Update failed');
    var r=allResumes.find(function(x){return x.id===rid;});
    if(r){r.status=newStatus;if(payload.last_applied_at)r.last_applied_at=payload.last_applied_at;}
    renderStats(allResumes);
    applyFilters();
    toast('âœ… Status updated');
  }catch(e){toast('âŒ '+e.message,false);}
}

async function addNoteToResume(rid){
  var inp=document.getElementById('ni-'+rid);
  var txt=(inp.value||'').trim();if(!txt)return;
  inp.value='';inp.disabled=true;
  try{
    var res=await fetch(SB+'/rest/v1/resume_notes',{
      method:'POST',
      headers:{apikey:SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=representation'},
      body:JSON.stringify({resume_id:rid,text:txt})
    });
    if(!res.ok)throw new Error('Save failed');
    var rows=await res.json();var note=rows[0];
    if(!notesCache[rid])notesCache[rid]=[];
    notesCache[rid].push(note);
    var box=document.getElementById('notes-'+rid);
    var noNote=box.querySelector('[style*="No notes"]');if(noNote)noNote.remove();
    var el=document.createElement('div');el.className='note-item';
    el.innerHTML='<div class="note-date">'+fmtDt(note.created_at)+'</div><div style="flex:1">'+esc(note.text)+'</div><button class="note-del" data-nid="'+note.id+'" data-rid="'+rid+'">âœ•</button>';
    box.insertBefore(el,box.lastElementChild);
    toast('Note added');
  }catch(e){toast('âŒ '+e.message,false);}
  finally{inp.disabled=false;inp.focus();}
}

async function deleteNote(nid,rid){
  if(!confirm('Delete this note?'))return;
  try{
    await fetch(SB+'/rest/v1/resume_notes?id=eq.'+nid,{method:'DELETE',headers:{apikey:SK,'Authorization':'Bearer '+SK}});
    notesCache[rid]=(notesCache[rid]||[]).filter(function(n){return n.id!==nid;});
    var box=document.getElementById('notes-'+rid);
    var el=box.querySelector('[data-nid="'+nid+'"]');if(el)el.closest('.note-item').remove();
    if(!notesCache[rid].length){box.insertAdjacentHTML('afterbegin','<div style="font-size:12px;color:var(--muted);font-style:italic;margin-bottom:8px">No notes yet.</div>');}
    toast('Note deleted');
  }catch(e){toast('âŒ '+e.message,false);}
}

async function deleteResume(rid){
  if(!confirm('Delete this tracked resume and all notes?'))return;
  try{
    await fetch(SB+'/rest/v1/resume_notes?resume_id=eq.'+rid,{method:'DELETE',headers:{apikey:SK,'Authorization':'Bearer '+SK}});
    await fetch(SB+'/rest/v1/tracked_resumes?id=eq.'+rid,{method:'DELETE',headers:{apikey:SK,'Authorization':'Bearer '+SK}});
    allResumes=allResumes.filter(function(r){return r.id!==rid;});
    delete notesCache[rid];
    renderStats(allResumes);applyFilters();
    toast('âœ… Deleted');
  }catch(e){toast('âŒ '+e.message,false);}
}

  document.getElementById('m-name').value=r.name||'';
  document.getElementById('m-company').value=r.company||'';
  document.getElementById('m-role').value=r.role||'';
  document.getElementById('m-url').value=r.job_url||'';
  document.getElementById('m-resume-doc').value=r.resume_doc_url||'';
  document.getElementById('m-score').value=r.score||'';
  document.getElementById('m-status').value=r.status||'draft';
  document.getElementById('m-last-applied').value=toDateInputFromIso(r.last_applied_at);
  document.getElementById('m-suggestions').value=r.suggestions||'';
  document.getElementById('m-content').value=r.resume_content||'';
  document.getElementById('m-jd').value=r.jd_snippet||'';
  // Change save button to update
  var saveBtn=document.querySelector('.modal-save');
  saveBtn.textContent='ðŸ’¾ Update';
  saveBtn.onclick=function(){updateResume(rid);};
  document.getElementById('addModal').classList.add('open');
}

async function updateResume(rid){
  var name=document.getElementById('m-name').value.trim();
  if(!name){toast('Enter a resume name.',false);return;}
  var status=document.getElementById('modal-status');status.textContent='â³ Saving...';
  try{
    var score=parseInt(document.getElementById('m-score').value)||0;
    var payload={
      name:name,company:document.getElementById('m-company').value.trim(),
      role:document.getElementById('m-role').value.trim(),
      job_url:document.getElementById('m-url').value.trim()||null,
      resume_doc_url:document.getElementById('m-resume-doc').value.trim()||null,
      score:score,score_title:score>=75?'Strong Match':score>=50?'Moderate Fit':'Weak Match',
      suggestions:document.getElementById('m-suggestions').value.trim()||null,
      resume_content:document.getElementById('m-content').value.trim()||null,
      jd_snippet:document.getElementById('m-jd').value.trim()||null,
      status:document.getElementById('m-status').value,
      last_applied_at:toIsoFromDateInput(document.getElementById('m-last-applied').value)
    };
    if(payload.status==='applied'&&!payload.last_applied_at)payload.last_applied_at=new Date().toISOString();
    var res=await fetch(SB+'/rest/v1/tracked_resumes?id=eq.'+rid,{
      method:'PATCH',
      headers:{apikey:SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    if(!res.ok)throw new Error('Update failed');
    var r=allResumes.find(function(x){return x.id===rid;});
    if(r)Object.assign(r,payload);
    status.textContent='âœ… Updated!';
    toast('âœ… Resume updated!');
    renderStats(allResumes);applyFilters();
    setTimeout(function(){
      closeAddModal();
      var saveBtn=document.querySelector('.modal-save');
      saveBtn.textContent='ðŸ’¾ Save';saveBtn.onclick=saveNewResume;
    },1000);
  }catch(e){status.textContent='âŒ '+e.message;toast('âŒ '+e.message,false);}
}

async function loadAll(){
  try{
    var cfg=await fetch('/api/config').then(function(r){return r.json();});
    SB=cfg.url;SK=cfg.key;
    AUTH_CLIENT=window.supabase.createClient(SB,SK);
    var s=await AUTH_CLIENT.auth.getSession();
    AUTH_TOKEN=s&&s.data&&s.data.session&&s.data.session.access_token;
    if(!AUTH_TOKEN){window.location.href='/login?next='+encodeURIComponent('/resumes');return;}
    if(!window.__rxjdFetchPatched){
      var _ofetch=window.fetch.bind(window);
      window.fetch=function(url,opts){
        var o=opts||{};
        var h=o.headers||{};
        if(typeof url==='string'&&url.indexOf('/rest/v1/')!==-1){
          h['Authorization']='Bearer '+(AUTH_TOKEN||SK);
          if(!h['apikey'])h['apikey']=SK;
          o.headers=h;
        }
        return _ofetch(url,o);
      };
      window.__rxjdFetchPatched=true;
    }
    var r1=await fetch(SB+'/rest/v1/tracked_resumes?select=*&order=created_at.desc&limit=100',{headers:{apikey:SK,'Authorization':'Bearer '+SK}});
    if(!r1.ok)throw new Error('Supabase '+r1.status);
    allResumes=await r1.json();
    var r2=await fetch(SB+'/rest/v1/resume_notes?select=*&order=created_at.asc',{headers:{apikey:SK,'Authorization':'Bearer '+SK}});
    if(r2.ok){var notes=await r2.json();notesCache={};(notes||[]).forEach(function(n){if(!notesCache[n.resume_id])notesCache[n.resume_id]=[];notesCache[n.resume_id].push(n);});}
    renderStats(allResumes);applyFilters();
  }catch(e){document.getElementById('cardsContainer').innerHTML='<div class="loading-msg" style="color:var(--red)">Error: '+esc(e.message)+'</div>';}
}

async function logout(){
  try{ if(AUTH_CLIENT) await AUTH_CLIENT.auth.signOut(); }catch(_){}
  window.location.href='/login';
}

loadAll();
